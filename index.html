    pointer-events: none;
  }
  .field.error input { border-color: var(--error); }
  .field.error input:focus { box-shadow: 0 0 0 3px rgba(196,30,58,.2); }
  .field .err {
    color: var(--error);
    font-size: 12px;
    margin-top: 6px;
    display: none;
    font-weight: 500;
  }
  .field.error .err { display: flex; align-items: center; gap: 4px; }
  .field .hint-text {
    font-size: 12px;
    color: var(--muted);
    margin-top: 6px;
  }
  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* Postcode lookup */
  .postcode-row {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
    align-items: flex-end;
  }
  .postcode-row .field { flex: 1; margin: 0; }
  .postcode-row .btn {
    height: 50px;
    flex-shrink: 0;
    padding: 0 18px;
  }

  /* Address suggestions list */
  .suggestions {
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: #fff;
    margin-bottom: 14px;
    max-height: 240px;
    overflow-y: auto;
  }
  .suggestion {
    padding: 12px 14px;
    border-bottom: 1px solid var(--line);
    cursor: pointer;
    font-size: 14px;
    transition: background .12s ease;
  }
  .suggestion:hover { background: var(--bg); }
  .suggestion:last-child { border-bottom: 0; }

  /* Saved address chip */
  .saved-address {
    display: flex;
    gap: 12px;
    padding: 14px;
    background: var(--teal-50);
    border-radius: var(--radius);
    margin-bottom: 14px;
    align-items: flex-start;
  }
  .saved-address svg { flex-shrink: 0; color: var(--teal); margin-top: 2px; }
  .saved-address-content { flex: 1; font-size: 14px; line-height: 1.45; }
  .saved-address-content strong { color: var(--navy); display: block; margin-bottom: 2px; font-size: 13px; text-transform: uppercase; letter-spacing: .04em; }
  .saved-address .btn-text { padding: 0; font-size: 13px; }

  /* Store list */
  .store-list { display: flex; flex-direction: column; gap: 10px; }
  .store-card {
    padding: 14px 16px;
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }
  .store-card .radio { margin-top: 3px; }
  .store-content { flex: 1; min-width: 0; }
  .store-name { font-size: 15px; font-weight: 700; color: var(--navy); }
  .store-addr { font-size: 13px; color: var(--ink-2); margin-top: 2px; line-height: 1.45; }
  .store-meta {
    font-size: 12px;
    color: var(--muted);
    margin-top: 8px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .store-meta .open { color: var(--success); font-weight: 600; }
  .store-meta .closed { color: var(--error); font-weight: 600; }

  /* Order summary */
  .order-summary {
    padding: 16px;
    margin-bottom: 16px;
  }
  .order-row {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 14px;
  }
  .order-row .product-img {
    width: 56px; height: 56px; border-radius: 10px;
  }
  .order-row .product-img::after {
    width: 14px; height: 42px;
  }
  .order-row .product-img::before {
    height: 16px;
  }
  /* Pen image variant for the basket - uses the same actual product photo
     as the PDP rather than the CSS-only illustration. */
  .order-row-img {
    width: 64px;
    height: 64px;
    border-radius: 10px;
    background: #f5f5f5;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .order-row-img .pen-photo {
    width: 88%;
    height: 88%;
    max-width: 88%;
    max-height: 88%;
    object-fit: contain;
    margin: 0 auto;
  }
  .order-note {
    margin: 12px 0 0;
    font-size: 12px;
    line-height: 1.5;
    color: var(--muted);
  }

  /* ----- Checkout add-ons (Promo + Boots Advantage card accordions) ----- */
  .checkout-accordion {
    padding: 0;
    margin-bottom: 12px;
    overflow: hidden;
    border-radius: 8px;
    border: 1px solid #e5e5e5;
    background: #fff;
  }
  .checkout-accordion-head {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 18px;
    background: transparent;
    border: 0;
    cursor: pointer;
    font: inherit;
    text-align: left;
  }
  .checkout-accordion-icon {
    flex-shrink: 0;
    width: 36px;
    height: 36px;
    border-radius: 8px;
    background: #f5f5f5;
    color: #111;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .checkout-accordion-title {
    flex: 1;
    min-width: 0;
    font-size: 15px;
    font-weight: 600;
    color: #111;
    line-height: 1.3;
  }
  .checkout-accordion-chev {
    flex-shrink: 0;
    color: #6b6b6b;
    transition: transform .18s ease;
  }
  .checkout-accordion.open .checkout-accordion-chev { transform: rotate(180deg); }
  .checkout-accordion-body {
    display: none;
    padding: 0 18px 18px;
    border-top: 1px solid #f0f0f0;
    padding-top: 16px;
  }
  .checkout-accordion.open .checkout-accordion-body { display: block; }

  .checkout-addon-banner {
    background: #fbeae8;
    color: #8a3a35;
    padding: 12px 14px;
    border-radius: 6px;
    font-size: 13px;
    line-height: 1.45;
    margin-bottom: 14px;
  }
  .checkout-addon-row {
    display: flex;
    gap: 8px;
    align-items: stretch;
  }
  .checkout-addon-input {
    flex: 1;
    min-width: 0;
    height: 44px;
    border: 1px solid #cacaca;
    border-radius: 6px;
    padding: 0 14px;
    font: inherit;
    font-size: 14px;
    color: #111;
    background: #fff;
    -webkit-appearance: none;
    appearance: none;
  }
  .checkout-addon-input:focus { outline: none; border-color: #111; }
  .checkout-addon-input::placeholder { color: #9a9a9a; }
  .checkout-addon-apply {
    flex-shrink: 0;
    height: 44px;
    padding: 0 22px;
    border: 0;
    border-radius: 6px;
    background: #bcd0e6;
    color: #1a3a66;
    font: inherit;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: .04em;
    cursor: pointer;
  }
  .checkout-addon-apply:hover { background: #a8c3dd; }
  .checkout-addon-hint {
    margin: 12px 0 0;
    font-size: 12px;
    line-height: 1.5;
    color: #757575;
  }

  /* End-of-page payment summary - gives the user a clear, focused recap
     of what they're paying for (and crucially, when) right before the
     Continue button. Visually distinct from the order summary at the top
     so it doesn't feel like a duplicate. */
  .payment-summary {
    margin: 18px 0 4px;
    padding: 16px 18px;
    background: #fafafa;
    border: 1px solid #e5e5e5;
    border-radius: 12px;
  }
  .payment-summary-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--muted);
    margin-bottom: 12px;
  }
  .payment-summary-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 14px;
    color: var(--ink);
    margin-top: 8px;
    gap: 12px;
  }
  .payment-summary-row:first-of-type { margin-top: 0; }
  .payment-summary-row small {
    color: var(--muted);
    font-weight: 400;
    font-size: 12px;
  }
  .payment-summary-row .val { font-weight: 700; }
  .payment-summary-row .val.free { color: var(--success); }
  .payment-summary-row.big {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.01em;
  }
  .payment-summary-row.big .val { font-size: 22px; font-weight: 800; }
  .payment-summary-row.sub {
    font-size: 13px;
    color: var(--muted);
    margin-top: 10px;
  }
  .payment-summary-row.sub .val { color: var(--ink); font-weight: 600; }
  .payment-summary-divider {
    height: 1px;
    background: #e5e5e5;
    margin: 12px 0 12px;
  }
  .payment-summary-note {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.45;
    margin-top: 4px;
  }
  .payment-summary-row.discount {
    color: #1f8a4d;
  }
  .payment-summary-row.discount .val {
    color: #1f8a4d;
    font-weight: 700;
  }

  /* Discreet collapsible promo / advantage links - shows on the payment
     page below the methods, not as a prominent card. */
  .discreet-accordion {
    margin: 6px 0 0;
    border-bottom: 1px solid var(--line);
    padding: 10px 0;
  }
  .discreet-accordion:first-of-type { border-top: 1px solid var(--line); margin-top: 14px; }
  .discreet-accordion summary {
    list-style: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
    padding: 4px 2px;
  }
  .discreet-accordion summary::-webkit-details-marker { display: none; }
  .discreet-accordion summary::after {
    content: '▾';
    color: var(--muted);
    font-size: 11px;
    transition: transform .15s ease;
  }
  .discreet-accordion[open] summary::after { transform: rotate(180deg); }
  .discreet-applied {
    font-size: 11px;
    font-weight: 700;
    color: #1f8a4d;
    background: #e9f6ee;
    padding: 2px 8px;
    border-radius: 999px;
    margin-left: auto;
    margin-right: 10px;
  }
  .discreet-accordion-body {
    padding: 10px 0 4px;
  }
  .discreet-accordion-hint {
    margin: 0 0 8px;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.45;
  }

  .trust.subtle {
    background: transparent;
    border: 0;
    padding: 8px 0 4px;
    color: var(--muted);
    font-size: 11px;
    gap: 6px;
  }

  /* In-page payment Continue button + the verification note that sits
     directly above it (moved from the top of the page so the user reads
     the basket and conditions first). */
  .payment-verify-note {
    font-size: 13px;
    line-height: 1.5;
    color: var(--muted);
    margin: 18px 4px 12px;
    text-align: center;
  }
  .payment-continue-btn {
    margin-bottom: 12px;
  }
  .payment-continue-btn:disabled {
    opacity: 0.45;
    cursor: not-allowed;
  }
  .fulfilment-inline-action {
    margin: 4px 0 14px;
  }

  /* Medical Questions wizard - small "Question X of Y" indicator above the title */
  .medical-progress {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin: 4px 0 18px;
  }
  .medical-progress-step {
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .medical-progress-bar {
    width: 100%;
    height: 4px;
    background: var(--bg);
    border-radius: 999px;
    overflow: hidden;
  }
  .medical-progress-bar span {
    display: block;
    height: 100%;
    background: var(--navy);
    border-radius: 999px;
    transition: width .25s ease;
  }
  /* Skip-all link shown on the first medical question only */
  .medical-skip-btn {
    display: block;
    width: 100%;
    margin: 18px 0 0;
    padding: 14px 0;
    background: transparent;
    color: var(--muted);
    border: 0;
    font: inherit;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    text-decoration: underline;
    text-underline-offset: 3px;
    cursor: pointer;
    text-align: center;
  }
  .medical-skip-btn:hover { color: var(--ink); }

  /* ── "Other medicines" — search + photo + list ────────────────── */
  .meds-search-wrap {
    position: relative;
    margin-top: 4px;
  }
  .meds-search-field {
    position: relative;
    display: flex;
    align-items: center;
  }
  .meds-search-icon {
    position: absolute;
    left: 14px;
    color: var(--muted);
    pointer-events: none;
  }
  .meds-search-input {
    width: 100%;
    height: 48px;
    padding: 0 14px 0 40px;
    font: inherit;
    font-size: 15px;
    border: 1.5px solid var(--line-2);
    border-radius: var(--radius-sm);
    background: #fff;
    color: var(--ink);
    transition: border-color .15s, box-shadow .15s;
    -webkit-appearance: none;
    appearance: none;
  }
  .meds-search-input:focus {
    outline: none;
    border-color: var(--navy);
    box-shadow: var(--focus);
  }
  .meds-search-results {
    margin-top: 6px;
    border: 1.5px solid var(--line-2);
    border-radius: var(--radius-sm);
    background: #fff;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .meds-search-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    background: #fff;
    border: 0;
    border-bottom: 1px solid var(--line);
    font: inherit;
    font-size: 14px;
    color: var(--ink);
    text-align: left;
    cursor: pointer;
    transition: background .12s;
  }
  .meds-search-row:last-child { border-bottom: 0; }
  .meds-search-row:hover { background: #f6f7fb; }
  .meds-search-row svg { color: var(--navy); flex-shrink: 0; }
  .meds-search-row--add {
    font-style: italic;
    color: var(--navy);
    font-weight: 600;
  }

  .meds-photo-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin: 14px 0 6px;
  }
  .meds-photo-actions--single { grid-template-columns: 1fr; }
  .meds-photo-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    height: 48px;
    padding: 0 10px;
    background: #fff;
    border: 1.5px solid var(--navy);
    border-radius: var(--radius-sm);
    font: inherit;
    font-size: 13px;
    font-weight: 600;
    color: var(--navy);
    cursor: pointer;
    transition: background .12s, color .12s;
  }
  .meds-photo-btn:hover { background: var(--navy); color: #fff; }
  .meds-photo-btn svg { flex-shrink: 0; }

  .meds-list-section { margin-top: 18px; }
  .meds-list-title {
    margin: 0 0 10px;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .meds-list {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .med-item {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 12px;
    background: #f6f7fb;
    border: 1px solid var(--line-2);
    border-radius: 10px;
  }
  .med-item-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .med-item-note {
    width: 100%;
    min-height: 36px;
    padding: 8px 10px;
    font: inherit;
    font-size: 13px;
    line-height: 1.4;
    color: var(--ink);
    background: #fff;
    border: 1px solid var(--line-2);
    border-radius: 8px;
    resize: none;
    overflow: hidden;
    transition: border-color .15s, box-shadow .15s;
    box-sizing: border-box;
  }
  .med-item-note:focus {
    outline: none;
    border-color: var(--navy);
    box-shadow: var(--focus);
  }
  .med-item-note::placeholder { color: var(--muted); }
  .med-item-icon {
    flex-shrink: 0;
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: #eef0ff;
    color: var(--navy);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .med-item-icon.photo {
    background: #fff4e6;
    color: #b8550a;
  }
  .med-item-body { flex: 1; min-width: 0; }
  .med-item-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--ink);
    line-height: 1.3;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .med-item-source {
    margin-top: 2px;
    font-size: 12px;
    color: var(--muted);
  }
  .med-item-remove {
    flex-shrink: 0;
    background: transparent;
    border: 0;
    padding: 6px;
    color: var(--muted);
    cursor: pointer;
    border-radius: 6px;
    transition: background .12s, color .12s;
  }
  .med-item-remove:hover { background: rgba(0,0,0,0.06); color: var(--error); }

  /* Treatment Selection page title must fit on one line */
  .product-page-title {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* "Your recommended treatment" section heading */
  .rx-section-head {
    margin: 12px 0 12px;
  }
  .rx-section-title {
    margin: 0 0 4px;
    font-size: 17px;
    font-weight: 800;
    color: var(--navy);
    letter-spacing: -0.01em;
  }
  .rx-section-sub {
    margin: 0;
    font-size: 13px;
    color: var(--muted);
    line-height: 1.5;
  }

  /* "Recommended" pill + match-note sit on the page directly above the hero
     product card (no surrounding panel). */
  .rx-hero-badge {
    display: inline-block;
    background: #111;
    color: #fff;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 999px;
    margin: 0 0 10px;
  }
  .rx-hero-note {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    margin: 0 0 12px;
    font-size: 14px;
    color: var(--ink);
    line-height: 1.45;
  }
  .rx-hero-note svg {
    flex-shrink: 0;
    color: #1f8a4d;
    margin-top: 3px;
  }

  /* Page-level title above the clinician card */
  .rx-page-title {
    font-size: 20px;
    font-weight: 800;
    color: var(--navy);
    margin: 16px 0 16px;
    letter-spacing: -0.01em;
  }

  /* =====================================================================
     Figma node 1:1194 — Choose Treatment page (new layout)
     ===================================================================== */

  /* Body wrapper: flex-col, gap 24px, px 24px — Figma node 1:1200 */
  .rx-body {
    display: flex;
    flex-direction: column;
    gap: 24px;
    padding: 0 24px 24px;
    width: 100%;
    box-sizing: border-box;
  }

  /* Top Clinical Note — node 1:1201
     White + green (#dff1eb) tinted bg, rounded 8px, p 16px, gap 12px */
  .rx-top-note {
    background: linear-gradient(90deg,rgba(255,255,255,.5),rgba(255,255,255,.5)),
                linear-gradient(90deg,#dff1eb,#dff1eb);
    border-radius: 8px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
    box-sizing: border-box;
  }
  /* Thumb + title row — node 1:1202 */
  .rx-tn-header {
    display: flex;
    gap: 8px;
    align-items: flex-start;
  }
  .rx-tn-avatar {
    width: 48px; height: 48px;
    border-radius: 50%;
    overflow: hidden;
    flex-shrink: 0;
    background: var(--bod-deep-blue);
  }
  .rx-tn-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .rx-tn-meta {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex: 1 0 0;
    min-width: 0;
  }
  .rx-tn-role {
    font-size: 12px; font-weight: 400; line-height: 20px;
    letter-spacing: 0.1px;
    color: var(--bod-navy);
    text-transform: uppercase;
  }
  .rx-tn-name {
    font-size: 12px; font-weight: 700; line-height: 20px;
    letter-spacing: 0.1px;
    color: var(--bod-navy);
  }
  /* Green bar + quote — node 1:1207 */
  .rx-tn-quote {
    display: flex;
    gap: 8px;
    align-items: flex-start;
  }
  .rx-tn-bar {
    width: 3px;
    border-radius: 88px;
    background: #61bb99;
    align-self: stretch;
    flex-shrink: 0;
  }
  .rx-tn-quote-text {
    font-size: 20px; font-weight: 400; line-height: 28px;
    letter-spacing: 0.2px;
    color: var(--bod-navy);
    flex: 1 0 0;
    min-width: 0;
  }
  .rx-tn-body {
    font-size: 12px; font-weight: 400; line-height: 20px;
    letter-spacing: 0.1px;
    color: var(--bod-navy);
  }

  /* Section heading — node 1:1211 */
  .rx-section-heading {
    display: flex;
    flex-direction: column;
    gap: 4px;
    width: 100%;
  }
  .rx-section-heading h3 {
    font-size: 18px; font-weight: 400; line-height: 27px;
    letter-spacing: 0.2px;
    color: var(--bod-navy);
    margin: 0;
  }
  .rx-section-heading p {
    font-size: 14px; font-weight: 400; line-height: 20px;
    letter-spacing: 0.1px;
    color: var(--bod-navy);
    margin: 0;
  }

  /* Product card — node 1:1214 */
  .rx-product-card {
    background: #fff;
    border: 1px solid var(--bod-line);
    border-radius: 8px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    width: 100%;
    box-sizing: border-box;
    overflow: hidden;
  }
  /* Label pills row — node 1:1215 */
  .rx-pc-labels {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }
  .rx-pc-label {
    border: 2px solid var(--bod-navy);
    border-radius: 888px;
    padding: 4px 12px;
    font-size: 11px; font-weight: 700; line-height: 20px;
    letter-spacing: 0.1px;
    color: var(--bod-navy);
    white-space: nowrap;
  }
  /* Product image + title row — node 1:1220 */
  .rx-pc-img-title {
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .rx-pc-img {
    width: 100px; height: 100px;
    border-radius: 8px;
    background: radial-gradient(ellipse at 50% 50%, rgba(255,255,255,.4) 0%, #ceeaff 100%),
                #e5f4ff;
    flex-shrink: 0;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .rx-pc-img img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  .rx-pc-title {
    flex: 1 0 0; min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .rx-pc-name {
    font-size: 24px; font-weight: 400; line-height: 32px;
    letter-spacing: 0.2px;
    color: var(--bod-navy);
    margin: 0;
  }
  .rx-pc-name sup { font-size: 15px; vertical-align: super; }
  .rx-pc-sub {
    font-size: 14px; font-weight: 400; line-height: 20px;
    letter-spacing: 0.1px;
    color: var(--bod-navy);
    margin: 0;
  }
  /* Divider */
  .rx-pc-divider { height: 1px; background: var(--bod-line); width: 100%; }
  /* Price — node 1:1231 */
  .rx-pc-price {
    display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap;
    font-size: 18px; font-weight: 400; line-height: 27px;
    letter-spacing: 0.2px;
    color: var(--bod-navy);
  }
  .rx-pc-price-label {
    font-size: 11px; line-height: 16px; letter-spacing: 0.1px;
    text-transform: uppercase; color: var(--bod-success); font-weight: 700;
    width: 100%;
  }
  .rx-pc-price .rx-pc-price-now { font-weight: 700; white-space: nowrap; }
  .rx-pc-price .rx-pc-price-per { font-size: 14px; font-weight: 400; }
  .rx-pc-price .rx-pc-price-was { font-size: 14px; color: #858585; white-space: nowrap; }
  .rx-pc-price .rx-pc-price-was s { text-decoration: line-through; }
  /* In-card clinician note highlight — node 1:1233 */
  .rx-pc-highlight {
    background: linear-gradient(90deg,rgba(255,255,255,.5),rgba(255,255,255,.5)),
                linear-gradient(90deg,#dff1eb,#dff1eb);
    border-radius: 8px;
    padding: 16px;
    display: flex;
    gap: 12px;
    align-items: flex-start;
    width: 100%;
    box-sizing: border-box;
  }
  .rx-pc-highlight-bar {
    width: 3px;
    border-radius: 88px;
    background: #61bb99;
    align-self: stretch;
    flex-shrink: 0;
  }
  .rx-pc-highlight-body {
    flex: 1 0 0; min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .rx-pc-highlight-clin {
    display: flex; align-items: center; gap: 8px;
  }
  .rx-pc-highlight-avatar {
    width: 24px; height: 24px; border-radius: 50%; overflow: hidden; flex-shrink: 0;
    background: var(--bod-deep-blue);
  }
  .rx-pc-highlight-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .rx-pc-highlight-clin-name {
    font-size: 12px; line-height: 20px; letter-spacing: 0.1px;
    font-weight: 700; color: var(--bod-navy);
  }
  .rx-pc-highlight-label {
    font-size: 12px; font-weight: 400; line-height: 20px;
    text-transform: uppercase; letter-spacing: 0.1px;
    color: var(--bod-navy);
  }
  .rx-pc-highlight-text {
    font-size: 12px; font-weight: 400; line-height: 20px;
    letter-spacing: 0.1px;
    color: var(--bod-navy);
  }
  /* Bullet list — node 1:1238 */
  .rx-pc-bullets {
    list-style: disc;
    padding-left: 21px;
    margin: 0;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .rx-pc-bullets li {
    font-size: 14px; font-weight: 400; line-height: 20px;
    letter-spacing: 0.1px;
    color: var(--bod-navy);
  }
  /* CTA button — node 1:1242 */
  .rx-pc-cta {
    background: var(--bod-deep-blue);
    border: 0;
    border-radius: 8px;
    height: 52px;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font: inherit;
    font-size: 14px; font-weight: 400; line-height: 20px;
    letter-spacing: 0.1px;
    color: #fff;
    cursor: pointer;
    transition: background .12s ease;
  }
  .rx-pc-cta:hover { background: #082f6a; }

  /* ── node 25:540 — product card with hat cap + select states ───────── */
  .rx-pc-wrap { display: flex; flex-direction: column; width: 100%; }
  .rx-pc-hat { position: relative; height: 24px; width: 100%; }
  .rx-pc-hat-bg {
    position: absolute; left: 0; top: 12px; height: 12px; width: 100%;
    background: #fff; box-sizing: border-box;
    border: 2px solid var(--bod-line); border-bottom: 0;
    border-radius: 8px 8px 0 0;
  }
  .rx-pc-wrap.is-selected .rx-pc-hat-bg { border: 3px solid var(--bod-navy); border-bottom: 0; }
  .rx-pc-hat-labels { position: absolute; left: 10px; top: 0; display: flex; gap: 4px; }
  .rx-pc-hat-label {
    border-radius: 4px; padding: 2px 12px;
    font-size: 11px; font-weight: 700; line-height: 20px; letter-spacing: 0.1px;
    white-space: nowrap;
  }
  .rx-pc-hat-label.popular   { background: #0a3a81; color: #fff; }
  .rx-pc-hat-label.cheapest  { background: #c4ddf6; color: #05054b; }
  .rx-pc-hat-label.clinician { background: #653089; color: #fff; }
  .rx-pc-hat-label.effective { background: #00740b; color: #fff; }

  /* Card variants when it sits under a hat */
  .rx-pc-wrap .rx-product-card { border-radius: 0 0 8px 8px; }
  .rx-pc-wrap.is-other .rx-product-card    { border: 2px solid var(--bod-line); border-top: 0; }
  .rx-pc-wrap.is-selected .rx-product-card { border: 3px solid var(--bod-navy); border-top: 0; }
  .rx-pc-wrap.is-plain .rx-product-card    { border: 2px solid var(--bod-line); border-radius: 8px; }

  /* Product-card pricing block — Figma node 46:2609 */
  .rx-pc-price2 { display: flex; flex-direction: column; gap: 0; width: 100%; }
  .rx-pc-price-eyebrow {
    font-size: 12px; font-weight: 400; line-height: 20px; letter-spacing: 0.1px;
    text-transform: uppercase; color: var(--bod-navy);
  }
  .rx-pc-price-main {
    font-size: 18px; font-weight: 400; line-height: 27px; letter-spacing: 0.2px;
    color: var(--bod-navy);
  }
  .rx-pc-price-main s { color: #858585; font-size: 18px; }
  .rx-pc-price-points {
    font-size: 14px; font-weight: 700; line-height: 20px; letter-spacing: 0.1px;
    color: var(--bod-navy);
  }

  /* Green clinician quote box inside each product card — Figma node 32:770 */
  .rx-pc-quote {
    background: var(--bod-pc-quote-bg, #dff1eb);
    border-left: 3px solid #61bb99;
    border-radius: 4px;
    padding: 12px 14px;
    width: 100%;
    box-sizing: border-box;
  }
  .rx-pc-quote p {
    margin: 0;
    font-size: 13px; font-weight: 400; line-height: 19px; letter-spacing: 0.1px;
    color: var(--bod-navy);
  }

  /* Treatment page header (title + subtext) — sits on the body gradient */
  .rx-page-head { display: flex; flex-direction: column; gap: 8px; width: 100%; padding: 4px 0 4px; }
  /* Match every other page heading (24/32 Boots Sharp Regular, navy).
     !important overrides the global Nike-style h2 (30px/700/#111). */
  .rx-page-head h2 {
    margin: 0 !important; font-size: 24px !important; font-weight: 400 !important;
    line-height: 32px !important; letter-spacing: 0.2px !important;
    color: var(--bod-navy) !important;
  }
  .rx-page-head p {
    margin: 0; font-size: 14px; font-weight: 400; line-height: 20px;
    letter-spacing: 0.1px; color: var(--bod-navy);
  }

  /* "Other options available to you" + Show more/less toggle — node 32:870 */
  .rx-other-head {
    font-size: 18px; font-weight: 400; line-height: 27px; letter-spacing: 0.2px;
    color: var(--bod-navy); width: 100%; text-align: center; margin: 8px 0 0;
  }
  .rx-show-more {
    background: #fff; border: 1px solid var(--bod-navy); border-radius: 8px;
    height: 44px; width: 100%; display: flex; align-items: center; justify-content: center; gap: 6px;
    font: inherit; font-size: 14px; font-weight: 400; letter-spacing: 0.1px;
    color: var(--bod-navy); cursor: pointer; transition: background .12s ease;
  }
  .rx-show-more:hover { background: var(--bod-pale-blue); }

  .rx-pc-btns { display: flex; flex-direction: column; gap: 8px; width: 100%; }
  .rx-pc-select {
    background: #fff; border: 1px solid var(--bod-navy); border-radius: 8px;
    height: 44px; width: 100%; display: flex; align-items: center; justify-content: center;
    font: inherit; font-size: 14px; font-weight: 400; letter-spacing: 0.1px;
    color: var(--bod-navy); cursor: pointer; transition: background .12s ease;
  }
  .rx-pc-select:hover { background: var(--bod-pale-blue); }
  .rx-pc-selected {
    background: var(--bod-deep-blue); border: 0; border-radius: 8px;
    height: 44px; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px;
    font: inherit; font-size: 14px; font-weight: 400; letter-spacing: 0.1px;
    color: #fff; cursor: default;
  }
  .rx-pc-selected .rx-pc-tick {
    width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
  }
  .rx-pc-viewlink {
    background: none; border: 0; font: inherit; font-size: 14px; letter-spacing: 0.1px;
    color: var(--bod-navy); text-decoration: underline; cursor: pointer;
    padding: 4px 16px; width: 100%; text-align: center;
  }

  /* New-customer green offer band — node 25:643 */
  .rx-offer-band {
    background: #dff1eb; border-radius: 8px; padding: 16px;
    display: flex; flex-direction: column; gap: 12px; width: 100%; box-sizing: border-box;
  }
  .rx-offer-head { display: flex; gap: 12px; align-items: center; }
  .rx-offer-badge {
    background: #61bb99; border-radius: 8px; padding: 8px 12px; min-width: 72px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 400; line-height: 20px; letter-spacing: 0.1px;
    color: var(--bod-navy); white-space: nowrap;
  }
  .rx-offer-title {
    font-size: 18px; font-weight: 400; line-height: 27px; letter-spacing: 0.2px;
    color: var(--bod-navy);
  }
  .rx-offer-body {
    font-size: 14px; font-weight: 400; line-height: 20px; letter-spacing: 0.1px;
    color: var(--bod-navy); margin: 0;
  }

  /* Read more toggle inside top clinical note */
  .rx-tn-more {
    display: inline-flex; align-items: center; gap: 2px; background: none; border: 0;
    font: inherit; font-size: 12px; letter-spacing: 0.1px; color: var(--bod-navy);
    text-decoration: underline; cursor: pointer; padding: 0;
  }
  .rx-tn-extra { max-height: 0; overflow: hidden; transition: max-height .25s ease; }
  .rx-tn-extra.open { max-height: 400px; }

  /* WELCOME10 promo band — node 1:1296 */
  .rx-promo-band {
    background: linear-gradient(90deg,rgba(255,255,255,.5),rgba(255,255,255,.5)),
                linear-gradient(90deg,#e6e1ef,#e6e1ef);
    border-radius: 8px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
    box-sizing: border-box;
  }
  .rx-promo-header {
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .rx-promo-badge {
    background: #653089;
    border-radius: 8px;
    padding: 12px;
    font-size: 11px; font-weight: 400; line-height: 20px;
    letter-spacing: 0.1px;
    color: #fff;
    white-space: nowrap;
  }
  .rx-promo-title {
    font-size: 18px; font-weight: 400; line-height: 27px;
    letter-spacing: 0.2px;
    color: var(--bod-navy);
    white-space: nowrap;
  }
  .rx-promo-body {
    font-size: 14px; font-weight: 400; line-height: 20px;
    letter-spacing: 0.1px;
    color: var(--bod-navy);
  }

  /* Footer references — node 1:1303 */
  .rx-refs-block {
    display: flex;
    flex-direction: column;
    gap: 16px;
    width: 100%;
  }
  .rx-refs-block p, .rx-refs-block li {
    font-size: 10px; font-weight: 400; line-height: 14px;
    letter-spacing: 0.1px;
    color: #595959;
    margin: 0;
  }
  .rx-refs-block ul {
    list-style: disc;
    padding-left: 15px;
    margin: 0;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  /* ---- Clinician recommendation card ---- */
  .rx-clinician-card {
    background: #f1f8f5;
    border: 1.5px solid #c8e6d7;
    border-radius: 10px;
    padding: 14px 16px 16px;
    margin-bottom: 20px;
  }
  .rx-clinician-header {
    display: flex;
    align-items: center;
    gap: 9px;
    margin-bottom: 10px;
  }
  .rx-clinician-avatar {
    width: 30px;
    height: 30px;
    background: var(--boots-green, #2c7a5f);
    color: #fff;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .rx-clinician-meta { display: flex; flex-direction: column; gap: 1px; }
  .rx-clinician-role {
    font-size: 10.5px;
    font-weight: 800;
    color: var(--boots-green, #2c7a5f);
    text-transform: uppercase;
    letter-spacing: 0.07em;
  }
  .rx-clinician-name { font-size: 12px; color: var(--muted); }
  .rx-clinician-condition-tag {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    font-weight: 600;
    color: var(--boots-green, #2c7a5f);
    background: #dff0e8;
    border-radius: 20px;
    padding: 4px 10px 4px 8px;
    margin-bottom: 10px;
  }
  .rx-clinician-divider {
    height: 1px;
    background: #c8e6d7;
    margin: 10px 0 12px;
  }
  .rx-clinician-body {
    font-size: 13.5px;
    color: var(--ink);
    line-height: 1.65;
  }
  .rx-clinician-body p { margin: 0 0 10px; }
  .rx-clinician-body p:last-child { margin-bottom: 0; }
  .rx-clinician-body strong { color: var(--navy); }
  .rx-clinician-body em { font-style: normal; color: var(--muted); font-size: 12.5px; }
  /* Bold opening statement — the hook line shown at the top of the card */
  .rx-clinician-lede {
    font-size: 15px;
    font-weight: 700;
    color: var(--navy);
    line-height: 1.4;
    margin: 0 0 10px !important;
  }
  /* Collapsible extra copy for the "none" scenario */
  .rx-clinician-extra {
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.28s ease;
  }
  .rx-clinician-extra.open { max-height: 600px; }
  .rx-clinician-toggle {
    background: none;
    border: none;
    color: var(--navy);
    font: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    padding: 10px 0 0;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .rx-clinician-toggle svg { transition: transform 0.22s; }
  .rx-clinician-toggle.expanded svg { transform: rotate(180deg); }

  /* Floating "Patient scenario" panel - sits to the right of the device on
     desktop, only visible on the Choose Treatment screen. */
  .scenario-fab {
    position: fixed;
    top: 50%;
    right: 24px;
    transform: translateY(-50%);
    z-index: 80;
    width: 220px;
    background: rgba(255, 255, 255, 0.98);
    backdrop-filter: saturate(180%) blur(14px);
    -webkit-backdrop-filter: saturate(180%) blur(14px);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 12px;
    box-shadow: 0 4px 20px rgba(15, 15, 50, 0.10);
    display: none;
  }
  body.on-product .scenario-fab { display: block; }
  /* Choose Treatment page: strip body horizontal padding (rx-body handles
     gutters) and apply the same flex+gap layout as question screens. */
  body.on-product .body { padding-left: 0; padding-right: 0; }
  body.on-product .body > .screen {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: 24px;
  }

  /* Treatment Details (PDP): same flex+gap layout, body padding retained. */
  .device.pdp-mode .body > .screen {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: 24px;
  }
  body.embed-mode .scenario-fab,
  body.web-view  .scenario-fab { display: none !important; }
  .scenario-fab-label {
    font-size: 10px;
    font-weight: 800;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin: 0 2px 8px;
  }
  .scenario-fab-btn {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    width: 100%;
    background: transparent;
    border: 0;
    text-align: left;
    padding: 9px 10px;
    border-radius: 10px;
    cursor: pointer;
    font-family: inherit;
    transition: background .15s ease;
  }
  .scenario-fab-btn:hover { background: var(--bg); }
  .scenario-fab-btn.active {
    background: var(--navy-50);
  }
  .scenario-fab-dot {
    flex-shrink: 0;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 1.5px solid var(--line-2);
    background: #fff;
    margin-top: 2px;
    position: relative;
    transition: border-color .15s ease;
  }
  .scenario-fab-btn.active .scenario-fab-dot {
    border-color: var(--navy);
  }
  .scenario-fab-btn.active .scenario-fab-dot::after {
    content: '';
    position: absolute;
    inset: 2px;
    border-radius: 50%;
    background: var(--navy);
  }
  .scenario-fab-text {
    display: flex;
    flex-direction: column;
    gap: 1px;
    min-width: 0;
  }
  .scenario-fab-text strong {
    font-size: 12px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.25;
  }
  .scenario-fab-text em {
    font-size: 10.5px;
    color: var(--muted);
    font-style: normal;
    line-height: 1.3;
  }
  /* Hide on narrower viewports where there's no room next to the device */
  @media (max-width: 1100px) {
    .scenario-fab { display: none !important; }
  }

  /* Boots Advantage Card scan button - sits between input and Apply */
  .advantage-row {
    display: flex;
    align-items: stretch;
    gap: 8px;
  }
  .advantage-row .checkout-addon-input { flex: 1; min-width: 0; }
  .advantage-scan-btn {
    flex-shrink: 0;
    width: 44px;
    background: #fff;
    border: 1.5px solid var(--line-2);
    border-radius: var(--radius-sm);
    color: var(--navy);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-family: inherit;
    transition: background .15s ease, border-color .15s ease;
  }
  .advantage-scan-btn:hover { background: var(--bg); border-color: var(--navy); }
  .advantage-scan-btn:focus-visible { outline: none; box-shadow: var(--focus); }

  /* Advantage card scan overlay (simulated camera viewfinder) */
  .advantage-scan { padding: 4px 0 12px; display: flex; flex-direction: column; gap: 16px; }
  .advantage-scan-helper {
    margin: 0;
    font-size: 14px;
    color: var(--ink-2);
    line-height: 1.5;
    text-align: center;
  }
  .advantage-scan-frame {
    position: relative;
    width: 100%;
    aspect-ratio: 5 / 3;
    max-height: 240px;
    background: #0f1422;
    border-radius: 14px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .advantage-scan-frame .photo-corner { border-color: #fff; }
  .advantage-scan-barcode {
    display: flex;
    align-items: center;
    gap: 2px;
    padding: 0 30px;
    width: 100%;
    justify-content: center;
  }
  .advantage-scan-barcode span {
    display: inline-block;
    height: 60px;
    background: #fff;
  }
  .advantage-scan-barcode span:nth-child(odd) { width: 2px; }
  .advantage-scan-barcode span:nth-child(even) { width: 4px; }
  .advantage-scan-barcode span:nth-child(3n) { width: 3px; }
  .advantage-scan-barcode span:nth-child(5n) { width: 5px; }
  .advantage-scan-line {
    position: absolute;
    left: 8%;
    right: 8%;
    height: 2px;
    background: linear-gradient(90deg, transparent, #ff3838, transparent);
    box-shadow: 0 0 10px rgba(255, 56, 56, 0.6);
    animation: scan-line 1.4s ease-in-out infinite;
  }
  @keyframes scan-line {
    0%, 100% { top: 22%; }
    50% { top: 78%; }
  }
  .advantage-scan-status {
    margin: 0;
    font-size: 14px;
    font-weight: 600;
    color: var(--muted);
    text-align: center;
  }
  .advantage-scan-status.done { color: #1f8a4d; }

  /* ----- Photo capture (ID + body photos) ----- */
  .photo-capture-title { margin-bottom: 6px; }
  .photo-frame {
    position: relative;
    width: 100%;
    aspect-ratio: 4 / 5;
    max-height: 420px;
    background: #fafafa;
    border-radius: 12px;
    margin: 4px 0 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .photo-frame.taken {
    background: #e9f6ee;
  }
  .photo-frame-inner {
    color: #2a2a2c;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .photo-frame.taken .photo-frame-inner {
    color: #1f8a4d;
  }
  .photo-frame-tick {
    position: absolute;
    top: -8px;
    right: -28px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: #1f8a4d;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  }
  /* Corner brackets evoking a viewfinder */
  .photo-corner {
    position: absolute;
    width: 28px;
    height: 28px;
    border-color: #1d1d1b;
    border-style: solid;
    border-width: 0;
  }
  .photo-corner.tl { top: 12px; left: 12px; border-top-width: 3px; border-left-width: 3px; border-top-left-radius: 4px; }
  .photo-corner.tr { top: 12px; right: 12px; border-top-width: 3px; border-right-width: 3px; border-top-right-radius: 4px; }
  .photo-corner.bl { bottom: 12px; left: 12px; border-bottom-width: 3px; border-left-width: 3px; border-bottom-left-radius: 4px; }
  .photo-corner.br { bottom: 12px; right: 12px; border-bottom-width: 3px; border-right-width: 3px; border-bottom-right-radius: 4px; }
  .photo-take-btn {
    margin-top: 0;
  }
  .photo-pick-id-hint {
    margin: 16px 0 0;
    font-size: 13px;
    color: var(--muted);
    text-align: center;
  }

  /* ===== Camera viewfinder UI ===== */
  .cam-vf {
    position: relative;
    background: #0c0f14;
    border-radius: 16px;
    overflow: hidden;
    width: 100%;
    margin: 8px 0 16px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .cam-vf-bg {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 42%, #1a2232 0%, #0c0f14 100%);
  }
  .cam-status-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 4;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px 28px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.65) 0%, transparent 100%);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.05em;
  }
  .cam-status-label { opacity: 0.65; font-weight: 500; font-size: 11px; }
  .cam-rec-dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #ff3b30;
    margin-right: 5px;
    vertical-align: middle;
    animation: cam-rec-blink 1.1s step-end infinite;
  }
  @keyframes cam-rec-blink { 0%,100% { opacity:1; } 50% { opacity:0.12; } }
  .cam-hint-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    z-index: 4;
    padding: 26px 16px 14px;
    background: linear-gradient(to top, rgba(0,0,0,0.72) 0%, transparent 100%);
    color: rgba(255,255,255,0.82);
    font-size: 12.5px;
    text-align: center;
    line-height: 1.45;
  }
  .cam-hint-bar strong {
    display: block;
    font-size: 13.5px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 3px;
  }
  /* Camera corner markers */
  .cam-corners { position: absolute; inset: 12px; z-index: 3; pointer-events: none; }
  .cam-corner-mark {
    position: absolute;
    width: 18px; height: 18px;
    border-color: rgba(255,255,255,0.28);
    border-style: solid;
    border-width: 0;
  }
  .cam-corner-mark.tl { top:0;left:0; border-top-width:2px; border-left-width:2px; border-top-left-radius:3px; }
  .cam-corner-mark.tr { top:0;right:0; border-top-width:2px; border-right-width:2px; border-top-right-radius:3px; }
  .cam-corner-mark.bl { bottom:0;left:0; border-bottom-width:2px; border-left-width:2px; border-bottom-left-radius:3px; }
  .cam-corner-mark.br { bottom:0;right:0; border-bottom-width:2px; border-right-width:2px; border-bottom-right-radius:3px; }
  /* ID card guide outline */
  .cam-guide-card {
    position: relative;
    z-index: 2;
    width: 78%;
    aspect-ratio: 1.586;
    border: 2.5px dashed rgba(0,218,90,0.52);
    border-radius: 10px;
    transition: border-color 0.4s ease, border-style 0.4s ease, box-shadow 0.4s ease;
  }
  .cam-guide-card.aligned {
    border-style: solid;
    border-color: #00da5a;
    box-shadow: 0 0 0 4px rgba(0,218,90,0.2), 0 0 28px rgba(0,218,90,0.12);
  }
  /* Body silhouette guide outline */
  .cam-guide-body-el {
    position: relative;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: filter 0.4s ease;
  }
  .cam-guide-body-el .body-outline {
    stroke: rgba(0,218,90,0.5);
    stroke-dasharray: 5 3;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
    transition: stroke 0.35s ease, stroke-dasharray 0.35s ease;
  }
  .cam-guide-body-el.aligned .body-outline {
    stroke: #00da5a;
    stroke-dasharray: 0;
  }
  .cam-guide-body-el.aligned { filter: drop-shadow(0 0 7px rgba(0,218,90,0.4)); }

  /* ===== Full-screen camera mode ===== */
  /* Applied to #device when body photo camera is active */
  .device.camera-mode .app-bar { display: none !important; }
  .device.camera-mode .footer  { display: none !important; }
  .device.camera-mode .body {
    padding: 0 !important;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .device.camera-mode .screen { flex: 1; display: flex; flex-direction: column; }
  .device.camera-mode .cam-vf {
    flex: 1;
    border-radius: 0;
    margin: 0;
    min-height: 0 !important;
    max-height: none;
  }

  /* ===== Photo review screen (light, matches app style) ===== */
  .ph-review-page {
    display: flex;
    flex-direction: column;
    gap: 18px;
    padding-top: 4px;
  }
  .ph-review-header { }
  .ph-review-title {
    font-size: 24px;
    font-weight: 800;
    color: var(--ink);
    line-height: 1.2;
    margin: 0 0 4px;
    letter-spacing: -0.02em;
  }
  .ph-review-sub {
    font-size: 14px;
    color: var(--ink-2);
    margin: 0;
  }

  /* Visual check banner */
  .ph-check-banner {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #f0faf4;
    border: 1.5px solid #a7d7b8;
    border-radius: 10px;
    padding: 12px 14px;
  }
  .ph-check-banner-icon {
    flex-shrink: 0;
    width: 32px; height: 32px;
    border-radius: 50%;
    background: #1f8a4d;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .ph-check-banner-text { }
  .ph-check-banner-title {
    font-size: 13px;
    font-weight: 700;
    color: #155734;
    line-height: 1.2;
  }
  .ph-check-banner-sub {
    font-size: 12px;
    color: #1f8a4d;
    margin-top: 2px;
  }

  /* Photo cards — two side-by-side */
  .ph-review-photos-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .ph-review-photo { display: flex; flex-direction: column; gap: 6px; }
  .ph-review-label-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
    font-weight: 600;
    color: var(--ink);
  }
  .ph-review-badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    background: #e8f6ee;
    color: #1f8a4d;
    border-radius: 20px;
    padding: 2px 7px;
    font-size: 11px;
    font-weight: 600;
  }
  .ph-review-card {
    background: #f3f4f8;
    border: 1.5px solid #e0e2ed;
    border-radius: 10px;
    overflow: hidden;
    aspect-ratio: 3/5;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .ph-review-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 10px;
    color: #c0c4d8;
  }
  .ph-review-retake {
    background: transparent;
    border: 0;
    color: var(--ink-2);
    font: inherit;
    font-size: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
    align-self: center;
    padding: 4px 6px;
    text-decoration: underline;
    text-underline-offset: 2px;
  }
  .ph-review-retake:hover { color: var(--navy); }

  /* T&Cs disclaimer */
  .ph-review-disclaimer {
    background: #f5f6fb;
    border: 1.5px solid #dde0ef;
    border-radius: 10px;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .ph-review-disclaimer-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--ink);
    margin: 0;
  }
  .ph-review-disclaimer-text {
    font-size: 12px;
    color: var(--ink-2);
    line-height: 1.5;
    margin: 0;
  }
  .ph-review-disclaimer-check {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    cursor: pointer;
  }
  .ph-review-disclaimer-check input[type="checkbox"] {
    margin-top: 2px;
    flex-shrink: 0;
    width: 16px; height: 16px;
    accent-color: var(--navy);
    cursor: pointer;
  }
  .ph-review-disclaimer-check-label {
    font-size: 12px;
    color: var(--ink);
    line-height: 1.45;
  }

  /* Sticky CTA */
  .ph-review-submit {
    position: sticky;
    bottom: 0;
    background: linear-gradient(to top, #fff 78%, transparent);
    padding: 14px 0 24px;
    margin-top: 4px;
  }
  .ph-review-submit-btn {
    width: 100%;
    height: 52px;
    background: var(--navy);
    color: #fff;
    border: 0;
    border-radius: 8px;
    font: 700 15px/1 'Boots Sharp', 'Inter', sans-serif;
    cursor: pointer;
    transition: background .12s ease, opacity .12s ease;
  }
  .ph-review-submit-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  .ph-review-submit-btn:not(:disabled):hover { background: #111e5a; }

  /* ===== Clinician submit disclaimer page ===== */
  .clinician-submit-page {
    display: flex;
    flex-direction: column;
    gap: 20px;
    padding-top: 4px;
  }
  .clinician-submit-icon {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: #eef0ff;
    flex-shrink: 0;
  }
  .clinician-declarations {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .clinician-declaration-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    font-size: 14px;
    color: var(--ink);
    line-height: 1.5;
  }
  .clinician-declaration-dot {
    flex-shrink: 0;
    margin-top: 6px;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--navy);
  }
  .clinician-consent-block {
    background: #f6f7fb;
    border: 1.5px solid var(--line-2);
    border-radius: 12px;
    padding: 14px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    cursor: pointer;
  }
  .clinician-consent-block input[type="checkbox"] {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
    margin-top: 1px;
    accent-color: var(--navy);
    cursor: pointer;
  }
  .clinician-consent-label {
    font-size: 13px;
    color: var(--ink);
    line-height: 1.5;
    cursor: pointer;
  }
  .clinician-consent-label u { color: var(--navy); }

  /* ===== Choose your mode screen ===== */
  .ph-mode-privacy {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    background: #f5f5f5;
    border-radius: 10px;
    padding: 12px 14px;
    margin: 12px 0;
    font-size: 13px;
    color: var(--ink-2);
    line-height: 1.45;
  }
  .ph-mode-privacy-icon {
    flex-shrink: 0;
    color: var(--navy);
    margin-top: 1px;
  }
  .ph-mode-lifestyle {
    width: 100%;
    aspect-ratio: 4/3;
    background: #1a1a2e;
    border-radius: 12px;
    margin: 4px 0 16px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .ph-mode-lifestyle-fig {
    opacity: 0.35;
  }
  .ph-mode-consent {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin: 0 0 16px;
    font-size: 13px;
    color: var(--ink-2);
    line-height: 1.5;
    cursor: pointer;
  }
  .ph-mode-consent input[type="checkbox"] {
    margin-top: 2px;
    flex-shrink: 0;
    width: 18px; height: 18px;
    accent-color: var(--navy);
    cursor: pointer;
  }
  .ph-mode-consent a { color: var(--navy); text-decoration: underline; }
  .ph-mode-btns {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 8px;
  }
  .ph-mode-btn-primary {
    width: 100%;
    padding: 16px;
    background: var(--navy);
    color: #fff;
    border: 0;
    border-radius: 10px;
    font: inherit; font-size: 15px; font-weight: 700;
    cursor: pointer;
    transition: opacity .15s ease;
  }
  .ph-mode-btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }
  .ph-mode-btn-secondary {
    width: 100%;
    padding: 15px;
    background: transparent;
    color: var(--navy);
    border: 1.5px solid var(--navy);
    border-radius: 10px;
    font: inherit; font-size: 15px; font-weight: 700;
    cursor: pointer;
    transition: opacity .15s ease;
  }
  .ph-mode-btn-secondary:disabled { opacity: 0.35; cursor: not-allowed; }

  /* ===== How to stand guide screens ===== */
  .ph-guide-wrap {
    position: relative;
    width: 100%;
    min-height: 340px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f7f8fa;
    border-radius: 16px;
    margin: 12px 0 16px;
    overflow: visible;
  }
  .ph-guide-pill {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    background: #111;
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    padding: 6px 14px;
    border-radius: 20px;
    white-space: nowrap;
    z-index: 4;
    letter-spacing: 0.02em;
  }
  .ph-guide-callout {
    position: absolute;
    font-size: 11px;
    font-weight: 600;
    color: var(--ink-2);
    line-height: 1.35;
    max-width: 96px;
    text-align: center;
    z-index: 3;
  }
  .ph-guide-callout-line {
    position: absolute;
    background: var(--line-2);
    z-index: 2;
  }

  /* ===== Camera enhancements ===== */
  .cam-bmi-ruler {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    width: 14px;
    height: 150px;
    border-radius: 7px;
    background: linear-gradient(to bottom, #e53935, #fb8c00, #fdd835, #43a047, #fdd835, #fb8c00, #e53935);
    z-index: 3;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 4px 0;
    overflow: hidden;
  }
  .cam-bmi-tick {
    width: 8px;
    height: 2px;
    background: rgba(255,255,255,0.7);
    border-radius: 1px;
    margin-left: 3px;
  }
  .cam-top-label {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 38px;
    background: rgba(0,0,0,0.55);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.04em;
    z-index: 5;
    backdrop-filter: blur(2px);
  }
  .cam-portrait-frame {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 68%;
    height: 85%;
    border: 2px dashed rgba(0,218,90,0.6);
    border-radius: 8px;
    z-index: 2;
    transition: border-color 0.35s ease, border-style 0.35s ease, box-shadow 0.35s ease;
  }
  .cam-portrait-frame.aligned {
    border-style: solid;
    border-color: #00da5a;
    box-shadow: 0 0 0 4px rgba(0,218,90,0.18), 0 0 20px rgba(0,218,90,0.15);
  }
  .cam-countdown {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    font-size: 72px;
    font-weight: 800;
    color: #00da5a;
    z-index: 6;
    text-shadow: 0 2px 16px rgba(0,0,0,0.5);
    animation: cam-count-pop 0.25s cubic-bezier(0.34,1.56,0.64,1) both;
    line-height: 1;
  }
  @keyframes cam-count-pop {
    from { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
    to   { transform: translate(-50%, -50%) scale(1);   opacity: 1; }
  }
  .cam-dots {
    position: absolute;
    bottom: 10px;
    left: 0; right: 0;
    display: flex;
    justify-content: center;
    gap: 8px;
    z-index: 5;
  }
  .cam-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.8);
    background: transparent;
    transition: background 0.2s ease;
  }
  .cam-dot.active {
    background: #fff;
  }
  .cam-shutter-wrap {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 16px 0 8px;
  }
  .cam-shutter {
    width: 64px; height: 64px;
    border-radius: 50%;
    border: 4px solid rgba(255,255,255,0.9);
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
  }
  .cam-shutter-inner {
    width: 48px; height: 48px;
    border-radius: 50%;
    background: #fff;
  }

  /* Aligned check badge */
  .cam-check {
    position: absolute;
    z-index: 6;
    bottom: 56px;
    left: 50%;
    width: 50px; height: 50px;
    border-radius: 50%;
    background: #00c853;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 0 10px rgba(0,200,83,0.2);
    animation: cam-check-pop 0.38s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes cam-check-pop {
    from { transform: translateX(-50%) scale(0); opacity:0; }
    to   { transform: translateX(-50%) scale(1); opacity:1; }
  }
  .cam-check { transform: translateX(-50%); }
  /* White flash on capture */
  .cam-flash {
    position: absolute; inset:0; z-index:20;
    background: #fff; pointer-events: none;
    animation: cam-flash-out 0.5s ease-out forwards;
  }
  @keyframes cam-flash-out { 0% { opacity:1; } 100% { opacity:0; } }

  /* AI quality-check overlay (shown after body photo capture) */
  .cam-ai-check {
    position: absolute; inset: 0; z-index: 25;
    background: rgba(9, 13, 22, 0.82);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    animation: fade-in 0.28s ease both;
  }
  @keyframes fade-in { from { opacity:0; } to { opacity:1; } }
  .cam-ai-ring {
    width: 56px; height: 56px;
    border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.15);
    border-top-color: #00da5a;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .cam-ai-label {
    font: 600 13px/1 'Boots Sharp', 'Inter', sans-serif;
    color: rgba(255,255,255,0.8);
    letter-spacing: 0.02em;
  }
  .cam-ai-accepted-icon {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: #00c853;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: cam-check-pop 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  .cam-ai-label--ok { color: #00da5a; }

  /* Photo intro — 3-step indicator */
  .ph-intro-steps {
    display: flex;
    align-items: center;
    margin: 6px 0 14px;
  }
  .ph-intro-step {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-weight: 600;
    color: #b0b8d1;
    white-space: nowrap;
  }
  .ph-intro-step--active { color: var(--navy); }
  .ph-intro-step-num {
    width: 20px; height: 20px;
    border-radius: 50%;
    background: #dde0ef;
    color: #b0b8d1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .ph-intro-step--active .ph-intro-step-num {
    background: var(--navy);
    color: #fff;
  }
  .ph-intro-step-done .ph-intro-step-num {
    background: #1f8a4d;
    color: #fff;
  }
  .ph-intro-step-done { color: #1f8a4d; }
  .ph-intro-step-line {
    flex: 1;
    height: 1.5px;
    background: #dde0ef;
    min-width: 10px;
    margin: 0 4px;
  }
  /* Review state */
  .cam-review-frame {
    position: relative;
    background: #0c0f14;
    border-radius: 16px;
    overflow: hidden;
    width: 100%;
    margin: 8px 0 16px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .cam-review-bg {
    position: absolute; inset:0;
    background: radial-gradient(ellipse at 50% 42%, #1a2232 0%, #0c0f14 100%);
  }
  .cam-review-content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .cam-review-tick {
    width: 60px; height: 60px;
    border-radius: 50%;
    background: #00c853;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 0 14px rgba(0,200,83,0.15);
    animation: cam-check-pop 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  .cam-review-label {
    color: rgba(255,255,255,0.72);
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.03em;
  }
  .cam-review-actions {
    display: grid;
    grid-template-columns: 1fr 2fr;
    gap: 10px;
    margin-bottom: 4px;
  }
  .cam-btn-retake {
    padding: 13px 14px;
    background: transparent;
    color: var(--ink);
    border: 1.5px solid var(--line-2);
    border-radius: 10px;
    font: inherit; font-size: 14px; font-weight: 600;
    cursor: pointer; text-align: center;
  }
  .cam-btn-confirm {
    padding: 13px 14px;
    background: var(--navy);
    color: #fff;
    border: 0;
    border-radius: 10px;
    font: inherit; font-size: 14px; font-weight: 700;
    cursor: pointer; text-align: center;
  }
  /* Confirmed state */
  .cam-confirmed-frame {
    position: relative;
    background: var(--success-50);
    border: 1.5px solid #b0ddbf;
    border-radius: 16px;
    width: 100%;
    margin: 8px 0 16px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .cam-confirmed-icon {
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    padding: 32px 0;
  }
  .cam-confirmed-tick {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: #1f8a4d;
    display: flex; align-items: center; justify-content: center;
    color: #fff;
  }
  .cam-confirmed-label {
    color: #1f8a4d; font-size: 15px; font-weight: 700;
  }

  /* ID type picker on the Photo ID step */
  .id-type-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin: 6px 0 16px;
  }
  .id-type-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 16px 10px;
    background: #fff;
    border: 1.5px solid var(--line);
    border-radius: 12px;
    cursor: pointer;
    font: inherit;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
    text-align: center;
    transition: border-color .15s ease, background .15s ease;
  }
  .id-type-btn svg { color: var(--navy); }
  .id-type-btn:hover { border-color: #999; }
  .id-type-btn.selected {
    border-color: var(--navy);
    box-shadow: 0 0 0 1px var(--navy) inset;
    background: var(--navy-50);
  }

  /* Body photos intro - numbered checklist */
  .photos-intro-list {
    list-style: none;
    padding: 0;
    margin: 12px 0 18px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .photos-intro-list li {
    display: flex;
    align-items: flex-start;
    gap: 14px;
  }
  .photos-intro-num {
    flex-shrink: 0;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--navy);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
  }
  .photos-intro-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.3;
  }
  .photos-intro-sub {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.45;
    margin-top: 2px;
  }
  .photos-intro-note {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
    text-align: center;
