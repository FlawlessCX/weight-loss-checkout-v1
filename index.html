function showToast(msg, kind = 'default') {
  toast.textContent = '';
  toast.className = 'toast ' + (kind !== 'default' ? kind : '');
  if (kind === 'error') {
    toast.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> <span>${escapeHTML(msg)}</span>`;
  } else if (kind === 'success') {
    toast.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg> <span>${escapeHTML(msg)}</span>`;
  } else {
    toast.textContent = msg;
  }
  toast.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => toast.classList.remove('show'), 2600);
}

function escapeHTML(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// Convert whatever the user has entered into cm / kg so validation and any
// downstream logic only ever speaks metric.
function getHeightCm() {
  if (state.heightUnit === 'imperial') {
    const ft = parseFloat(state.heightFt) || 0;
    const inch = parseFloat(state.heightIn) || 0;
    return ft * 30.48 + inch * 2.54;
  }
  return parseFloat(state.heightCm) || 0;
}
function getWeightKg() {
  if (state.weightUnit === 'imperial') {
    const st = parseFloat(state.weightSt) || 0;
    const lb = parseFloat(state.weightLb) || 0;
    return st * 6.35029 + lb * 0.453592;
  }
  return parseFloat(state.weightKg) || 0;
}

    <div style="display:flex;flex-direction:column;gap:24px;width:100%;">

      <div class="hw-block">

        <div class="hw-elements">
          <div class="hw-toggle" role="tablist" aria-label="Height units">

            <button type="button" class="hw-toggle-btn ${hImp ? 'active' : ''}"  data-unit-target="heightUnit" data-unit-value="imperial">ft/in</button>

          <div class="hw-toggle" role="tablist" aria-label="Weight units">

      <div class="hw-bmi" id="hw-bmi" aria-live="polite"></div>

  `;

  // Live BMI readout — recomputed on each keystroke
  function updateBmi() {
    const el = root.querySelector('#hw-bmi');
    if (!el) return;
    const h = getHeightCm() / 100;  // metres
    const w = getWeightKg();
    if (h > 0 && w > 0) {
      const bmi = w / (h * h);
      el.innerHTML = `Your BMI is <strong>${bmi.toFixed(1)}</strong>`;
      el.classList.add('show');
    } else {
      el.textContent = '';
      el.classList.remove('show');
    }
  }

  // Live-bind inputs so typing updates state without re-rendering (preserve focus)
  function bind(id, key) {
    const el = root.querySelector(`#${id}`);
    if (el) el.addEventListener('input', e => { state[key] = e.target.value; refreshFooterEnabledState(); updateBmi(); });
  }
  bind('q-height-cm', 'heightCm');
  bind('q-height-ft', 'heightFt');
  bind('q-height-in', 'heightIn');
  bind('q-weight-kg', 'weightKg');
  bind('q-weight-st', 'weightSt');
  bind('q-weight-lb', 'weightLb');
  updateBmi();  // initial readout when fields are pre-filled

  // Segmented unit toggle
  root.querySelectorAll('[data-unit-target]').forEach(btn => {
    btn.addEventListener('click', () => {
      const key = btn.dataset.unitTarget;
      const val = btn.dataset.unitValue;
      if (state[key] !== val) {
        state[key] = val;
        render();
      }
    });
  });
}

                      : `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.5 20.5 3 13a5 5 0 0 1 7-7l1 1 1-1a5 5 0 0 1 7 7"/></svg>`
                    }
                  </div>
                  <div class="med-item-body">
                    <div class="med-item-name">${escapeHTML(m.name)}</div>
                  </div>
                  <button type="button" class="med-item-remove" data-remove-id="${m.id}" aria-label="Remove ${escapeHTML(m.name)}">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                  </button>
                </div>
                <textarea
                  class="med-item-note"
                  data-note-id="${m.id}"
                  rows="1"
                  placeholder="Add a note (e.g. dose, how often, what it's for)"
                >${escapeHTML(m.note || '')}</textarea>
              </li>
            `).join('')}
          </ul>
        ` : ''}
      </div>
    `;

    // ── Search + add ──
    const searchInput = root.querySelector('#meds-search-input');
    const resultsBox  = root.querySelector('#meds-search-results');
    const addMed = (med) => {
      const list = Array.isArray(state.medicalAnswers[q.id]) ? state.medicalAnswers[q.id] : [];
      // Prevent duplicates by name
      if (list.some(m => m.name === med.name && m.source === med.source)) return;
      state.medicalAnswers[q.id] = [...list, { id: 'm_' + Date.now(), ...med }];
      render();
    };
    const showResults = (query) => {
      const q2 = (query || '').trim().toLowerCase();
      if (!q2) { resultsBox.hidden = true; resultsBox.innerHTML = ''; return; }
      const matches = MEDICINES_DB.filter(m => m.toLowerCase().includes(q2)).slice(0, 6);
      if (!matches.length) {
        resultsBox.innerHTML = `<button type="button" class="meds-search-row meds-search-row--add">Add "${escapeHTML(query)}" as custom medicine</button>`;
        resultsBox.hidden = false;
        resultsBox.querySelector('button').addEventListener('click', () => {
          addMed({ name: query.trim(), source: 'search' });
        });
        return;
      }
      resultsBox.innerHTML = matches.map(m =>
        `<button type="button" class="meds-search-row" data-med-name="${escapeHTML(m)}">
           <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
           ${escapeHTML(m)}
         </button>`
      ).join('');
      resultsBox.hidden = false;
      resultsBox.querySelectorAll('button[data-med-name]').forEach(btn => {
        btn.addEventListener('click', () => addMed({ name: btn.dataset.medName, source: 'search' }));
      });
    };
    searchInput?.addEventListener('input', (e) => showResults(e.target.value));
    searchInput?.addEventListener('focus', (e) => { if (e.target.value) showResults(e.target.value); });

    // ── Photo upload button (simulated capture) ──
    root.querySelectorAll('[data-photo-type]').forEach(btn => {
      btn.addEventListener('click', () => {
        const list = Array.isArray(state.medicalAnswers[q.id]) ? state.medicalAnswers[q.id] : [];
        const count = list.filter(m => m.source === 'photo').length + 1;
        addMed({ name: `Photo of medicine ${count}`, source: 'photo' });
      });
    });

    // ── Note field — saves on input without re-rendering (preserves focus) ──
    root.querySelectorAll('[data-note-id]').forEach(ta => {
      const autoresize = () => {
        ta.style.height = 'auto';
        ta.style.height = ta.scrollHeight + 'px';
      };
      autoresize();
      ta.addEventListener('input', () => {
        const id = ta.dataset.noteId;
        const list = Array.isArray(state.medicalAnswers[q.id]) ? state.medicalAnswers[q.id] : [];
        state.medicalAnswers[q.id] = list.map(m => m.id === id ? { ...m, note: ta.value } : m);
        autoresize();
      });
    });

    // ── Remove medicine ──
    root.querySelectorAll('[data-remove-id]').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = btn.dataset.removeId;
        const list = Array.isArray(state.medicalAnswers[q.id]) ? state.medicalAnswers[q.id] : [];
        state.medicalAnswers[q.id] = list.filter(m => m.id !== id);
        render();
      });
    });
    return;
  }

  // ── Standard single / multi question ──
  const selected = new Set(Array.isArray(answer) ? answer : (answer ? [answer] : []));

  root.innerHTML = `
    <div style="padding-top: 4px;">
      <h2>${escapeHTML(q.title)}</h2>
      ${q.lede ? `<p class="lede">${escapeHTML(q.lede)}</p>` : ''}
    </div>

    <div class="q-options">
      ${q.options.map(o => qOptionHtml('medical-option', o.key, o.label, selected.has(o.key))).join('')}
    </div>

  `;

  root.querySelector('#medical-skip')?.addEventListener('click', () => {
    // Skip the entire medical wizard - advance straight to the loading screen
    state.medicalStep = 0;
    lastDirection = 'forward';
    history.push('analysing');
    render();
    runAnalysing();
  });

  root.querySelectorAll('[data-medical-option]').forEach(el => {
    el.addEventListener('click', () => {
      const key = el.dataset.medicalOption;
      const opt = q.options.find(o => o.key === key);
      if (q.type === 'single') {
        state.medicalAnswers[q.id] = key;
      } else {
        const current = new Set(Array.isArray(state.medicalAnswers[q.id]) ? state.medicalAnswers[q.id] : []);
        if (opt && opt.exclusive) {
          // Exclusive option (e.g. "None of the above") clears all others
          state.medicalAnswers[q.id] = current.has(key) ? [] : [key];
        } else {
          if (current.has(key)) current.delete(key); else current.add(key);
          // If user picks a non-exclusive option, drop any exclusive selections
          q.options.filter(o => o.exclusive).forEach(o => current.delete(o.key));
          state.medicalAnswers[q.id] = [...current];
        }
      }
      render();
    });
  });
}

// True once the user has answered the current medical sub-question.
function medicalCurrentAnswered() {
  const q = MEDICAL_QUESTIONS[state.medicalStep || 0];
  if (!q) return true;
  const a = state.medicalAnswers[q.id];
  if (q.type === 'single') return !!a;
  if (q.type === 'meds-list') return Array.isArray(a) && a.length > 0;
  return Array.isArray(a) && a.length > 0;
}

// Returns the visible (non-skipped) questions based on parent answers.
// True when a question's parent dependency is satisfied. Supports both
// single-answer parents (pv === parentValue) and multi-select parents
// (the parent's answer array includes parentValue).
function medicalParentMatches(q) {
  if (!q.parentId) return true;
  const pa = state.medicalAnswers[q.parentId];
  if (Array.isArray(pa)) return pa.includes(q.parentValue);
  return pa === q.parentValue;
}
function activeMedicalQuestions() {
  return MEDICAL_QUESTIONS.filter(medicalParentMatches);
}

  const raw = (state.gpQuery || '').trim();

  if (!/^[A-Z]{1,2}\d[\dA-Z]?\s*\d[A-Z]{2}$/i.test(raw)) {
    showToast("That doesn't look like a UK postcode", 'error');
    document.querySelector('[data-field="gp-postcode"]')?.classList.add('error');

    });

}

// Horizontal swipe on the deck rotates the active card. Threshold is forgiving
// so a light flick advances/retreats by one position.
function bindDeckSwipe(deck, count) {
  let startX = null;
  let startY = null;
  deck.addEventListener('touchstart', (e) => {
    if (e.touches.length !== 1) return;
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
  }, { passive: true });
  deck.addEventListener('touchend', (e) => {
    if (startX == null) return;
    const t = (e.changedTouches && e.changedTouches[0]) || null;
    if (!t) { startX = null; return; }
    const dx = t.clientX - startX;
    const dy = t.clientY - startY;
    startX = null; startY = null;
    if (Math.abs(dx) < 40 || Math.abs(dx) < Math.abs(dy)) return;
    if (dx < 0) productCarouselIndex = (productCarouselIndex + 1) % count;
    else        productCarouselIndex = (productCarouselIndex - 1 + count) % count;
    render();
  });
}

function bindCarousel(carousel) {
  const track = carousel.querySelector('.carousel-track');
  const slides = carousel.querySelectorAll('.carousel-slide');
  const prev = carousel.querySelector('.carousel-prev');
  const next = carousel.querySelector('.carousel-next');
  const dots = carousel.querySelectorAll('.carousel-dot');
  const max = slides.length - 1;
  let i = 0;
  function update() {
    track.style.transform = `translateX(-${i * 100}%)`;
    dots.forEach((d, idx) => d.classList.toggle('active', idx === i));
    prev.style.opacity = i === 0 ? '0.35' : '1';
    next.style.opacity = i === max ? '0.35' : '1';
    prev.style.pointerEvents = i === 0 ? 'none' : 'auto';
    next.style.pointerEvents = i === max ? 'none' : 'auto';
  }
  prev.addEventListener('click', (e) => { e.stopPropagation(); if (i > 0) { i--; update(); } });
  next.addEventListener('click', (e) => { e.stopPropagation(); if (i < max) { i++; update(); } });
  // Touch swipe support
  let startX = null;
  carousel.addEventListener('touchstart', (e) => { startX = e.touches[0].clientX; }, { passive: true });
  carousel.addEventListener('touchend', (e) => {
    if (startX == null) return;
    const dx = e.changedTouches[0].clientX - startX;
    if (Math.abs(dx) > 40) {
      if (dx < 0 && i < max) i++;
      else if (dx > 0 && i > 0) i--;
      update();
    }
    startX = null;
  });
  update();
}

// Bolds the "X% / X weeks" parts of USP strings so the data jumps out
function formatUsp(s) {
  return escapeHTML(s).replace(/(\d+(?:\.\d+)?%|\d+\s*weeks?)/g, '<strong>$1</strong>');
}

// Renders the right illustration for a product (pen for injections, blister for pills)
function productIllustration(p) {
  // Prefer the inlined base64 data URI (works in any context - Claude
  // Preview sandbox, file://, or live deploy). Fall back to a relative path.
  const src = (typeof PRODUCT_IMAGES !== 'undefined' && PRODUCT_IMAGES[p.key]) || p.image;
  if (src) {
    return `<img class="pen-photo" src="${src}" alt="${escapeHTML(p.name)} ${p.imageType === 'pills' ? 'capsules' : 'injection pen'}" />`;
  }
  // Fallback to CSS illustrations
  if (p.imageType === 'pills') {
    return `
      <div class="pill-pack">
        <div class="blister">
          ${'<div class="pill"></div>'.repeat(10)}
        </div>
      </div>
    `;
  }
  return `
    <div class="pen-image">
      <div class="cap"></div>
      <div class="body"></div>
      <div class="label">${escapeHTML(p.name.toUpperCase())}</div>
      <div class="window">0</div>
      <div class="dial"></div>
    </div>
  `;
}

function renderFulfilment(root) {
  // While transitioning to Payment after the user picks their address/store,
  // show a brief loading state so the navigation feels responsive.
  if (state.fulfilmentLoading) {
    root.innerHTML = `
      <div class="fulfilment-loading">
        <div class="spinner lg dark"></div>
        <p>Updating your order…</p>
      </div>
    `;
    return;
  }

  const cheapestDelivery = Math.min(...DELIVERY_OPTIONS.map(d => d.price));
  const options = [
    {
      key: 'home',
      title: 'Home delivery',
      sub: 'Delivered to your chosen address.',
      priceLabel: `From £${cheapestDelivery.toFixed(2)}`,
      usps: ['Discreet, unbranded packaging', 'Free tracked delivery over £42', 'Cancel or change anytime'],
    },
    {
      key: 'store',
      title: 'Store pickup',
      sub: 'Collect from your preferred Boots store.',
      priceLabel: 'Free',
      priceFree: true,
      usps: ['Collect from 1,500+ Boots stores', 'Ready when your treatment is approved', 'Speak to a pharmacist in store'],
    },
  ];

  root.innerHTML = `
    <div style="background:transparent;min-height:164px;margin:0 -24px;
      padding:24px;display:flex;flex-direction:column;justify-content:flex-end;
      align-items:flex-start;box-sizing:border-box;width:calc(100% + 48px);">
      <p style="font-size:24px;font-weight:400;line-height:32px;letter-spacing:0.2px;color:var(--bod-navy);margin:0;">How would you like to receive your treatment?</p>
      <p style="font-size:14px;font-weight:400;line-height:20px;letter-spacing:0.1px;color:var(--bod-navy);margin:8px 0 0;">When approved by our clinician, your treatment can be delivered to you or collected from one of our Boots stores.</p>
    </div>

    <div style="display:flex;flex-direction:column;gap:12px;width:100%;margin-top:24px;">
    ${options.map(o => {
      const isSel = state.fulfilment === o.key;
      const data = o.key === 'home' ? state.address : (state.store ? `${state.store.name}, ${state.store.addr}` : null);
      const dataLabel = o.key === 'home' ? 'Deliver to' : 'Collect from';
      const deliveryOpt = o.key === 'home' && state.deliverySpeed
        ? DELIVERY_OPTIONS.find(d => d.id === state.deliverySpeed) : null;
      const addButtonLabel = o.key === 'home' ? 'Add address' : 'Select Store';
      const checkSvg = '<svg width="14" height="11" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
      const tickSvg = '<svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="var(--bod-success)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
      return `
        <div class="ful-card ${isSel ? 'selected' : ''}" data-fulfilment="${o.key}" role="button" tabindex="0">
          <div class="ful-card-check">${checkSvg}</div>
          <div class="ful-card-row">
            <span class="ful-card-title">${escapeHTML(o.title)}</span>
            <span class="ful-card-price">${escapeHTML(o.priceLabel)}</span>
          </div>
          <p class="ful-card-sub">${escapeHTML(o.sub)}</p>
          <ul class="ful-card-usps">
            ${o.usps.map(u => `<li><span class="ful-tick">${tickSvg}</span><span>${escapeHTML(u)}</span></li>`).join('')}
          </ul>
          ${isSel && data ? `
            <div class="ful-card-detail">
              <div><strong>${dataLabel}</strong><br>${escapeHTML(data)}${deliveryOpt ? `<br><span style="font-size:12px;">${escapeHTML(deliveryOpt.label)} · £${deliveryOpt.price.toFixed(2)}</span>` : ''}</div>
              <button type="button" class="ful-card-detail-edit" data-edit-overlay="${o.key === 'home' ? 'address' : 'store'}">Edit</button>
            </div>
          ` : ''}
          ${isSel && !data ? `
            <button type="button" class="rx-pc-cta" style="margin-top:8px;" data-open-overlay="${o.key === 'home' ? 'address' : 'store'}">${addButtonLabel}</button>
          ` : ''}
        </div>
      `;
    }).join('')}
    </div>
  `;

  // Selecting a fulfilment option immediately opens the relevant address /
  // store overlay so the user can pick their address with one fewer tap.
  // The chosen overlay then auto-advances to Payment once a value is picked.
  const handleSelect = key => {
    state.fulfilment = key;
    // Clear the OTHER side's data + the auto-advance flag so the new path
    // starts clean.
    if (key === 'home') { state.store = null; }
    if (key === 'store') { state.address = null; state.deliverySpeed = null; }
    state.fulfilmentAutoAdvance = true;
    render();
    // Open the overlay AFTER the re-render so the underlying screen is in
    // sync (selected card highlighted).
    requestAnimationFrame(() => {
      openOverlay(key === 'home' ? 'address' : 'store', 'select');
    });
  };

  root.querySelectorAll('[data-fulfilment]').forEach(el => {
    el.addEventListener('click', (e) => {
      // Don't re-trigger when the user is clicking an inner button (Edit, etc.)
      if (e.target.closest('[data-edit-overlay], [data-open-overlay], .fulfilment-summary-edit')) return;
      handleSelect(el.dataset.fulfilment);
    });
  });
  root.querySelectorAll('[data-switch]').forEach(el => {
    el.addEventListener('click', () => handleSelect(el.dataset.switch));
  });
  root.querySelectorAll('[data-open-overlay]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      openOverlay(el.dataset.openOverlay, 'select');
    });
  });
  root.querySelectorAll('[data-edit-overlay]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      openOverlay(el.dataset.editOverlay);
    });
  });
}

// ---------------------------------------------------------------------------
// Overlay (bottom sheet)
// ---------------------------------------------------------------------------
function openOverlay(type, context = 'select') {
  const overlay = document.getElementById('overlay');
  const sheetTitle = document.getElementById('sheet-title');
  state.overlayType = type;
  state.overlayContext = context;

  if (type === 'address') {
    sheetTitle.textContent = state.address ? 'Delivery' : 'Add delivery address';
    renderAddressOverlay();
  } else if (type === 'store') {
    sheetTitle.textContent = state.store ? 'Change collection store' : 'Find a Boots store';
    renderStoreOverlay();
  } else if (type === 'apple-auth') {
    renderApplePayAuthOverlay();
  } else if (type === 'product-selected') {
    sheetTitle.textContent = '';
    renderProductSelectedOverlay();
  } else if (type === 'exit-save') {
    sheetTitle.textContent = context === 'return-anytime' ? 'Your progress is saved' : 'Save your progress';
    renderExitSaveOverlay();
  } else if (type === 'advantage-scan') {
    sheetTitle.textContent = 'Scan your card';
    renderAdvantageScanOverlay();
  } else if (type === 'other-signin') {
    sheetTitle.textContent = 'Other ways to sign in';
    renderOtherSignInOverlay();
  } else if (type === 'passkey-info') {
    sheetTitle.textContent = '';
    renderPasskeyInfoOverlay();
  } else if (type === 'account-creation') {
    const methodTitles = {
      passkey:      'Set up your Passkey',
      google:       'Sign up with Google',
      apple:        'Sign up with Apple',
      'magic-link': 'Check your email',
    };
    sheetTitle.textContent = methodTitles[state.signInMethod] || 'Create account';
    renderAccountCreationOverlay();
  } else if (type === 'coach-details') {
    sheetTitle.textContent = '';
    renderCoachDetailsOverlay();
  } else if (type === 'vitamin-details') {
    sheetTitle.textContent = '';
    renderVitaminDetailsOverlay();
  } else if (type === 'q-exp-feedback') {
    sheetTitle.textContent = '';
    renderQExpFeedbackOverlay();
  } else if (type === 'social-auth') {
    sheetTitle.textContent = '';
    renderSocialAuthOverlay();
  }

  // Apple Pay gets a custom iOS-style chrome (white sheet, big logo header,
  // "Double-Click to Pay" indicator over the dimmed page).
  overlay.classList.toggle('apple-mode', type === 'apple-auth');
  document.querySelector('.sheet').classList.toggle('apple-pay-mode', type === 'apple-auth');

  // Q1 Experience feedback uses the Figma 1:1057 sheet pattern (full-height
  // white sheet from y=80, gap-24 stack, journey sticky footer).
  overlay.classList.toggle('qexp-feedback-mode', type === 'q-exp-feedback');
  overlay.classList.toggle('pso-mode', type === 'product-selected' || type === 'coach-details' || type === 'vitamin-details');
  overlay.classList.toggle('qexp-backdrop-mode', type === 'q-exp-feedback' || type === 'social-auth');

  overlay.classList.add('open');
  overlay.setAttribute('aria-hidden', 'false');
}

function closeOverlay() {
  const overlay = document.getElementById('overlay');
  const wasType = state.overlayType;
  overlay.classList.remove('open');
  overlay.setAttribute('aria-hidden', 'true');
  state.overlayType = null;
  // Cancel the fulfilment auto-advance if the user dismissed the overlay
  // without picking anything - they should see the fulfilment page again,
  // not get auto-pushed forward on a later overlay.
  state.fulfilmentAutoAdvance = false;
  // Experience feedback overlay: dismissing = "I want to change my answer",
  // so clear the selection and return the user to the unselected state.
  if (wasType === 'q-exp-feedback') {
    state.usedBefore = null;
  }
  // Refresh the underlying screen so the summary chip updates
  render();
}

document.querySelectorAll('[data-overlay-close]').forEach(el => {

// Save-progress-or-exit overlay - triggered from the X icon in the app bar
// AND from the fulfilment -> payment transition. Context determines copy and
// what each button does (exit vs. continue to payment).
function renderExitSaveOverlay() {
  const sheetBody = document.getElementById('sheet-body');
  const sheetFooter = document.getElementById('sheet-footer');
  const isSaveProgress = state.overlayContext === 'save-progress';
  const isReturnAnytime = state.overlayContext === 'return-anytime';

  // ── Post-account variant: account already created, just reassure them ──
  if (isReturnAnytime) {
    sheetBody.innerHTML = `
      <div class="exit-save">
        <div style="display:flex;align-items:center;justify-content:center;width:56px;height:56px;border-radius:50%;background:#eef0ff;margin:4px auto 8px;">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="var(--navy)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        </div>
        <p class="exit-save-lede" style="text-align:center;">${(state.contactFirstName || '').trim() ? escapeHTML((state.contactFirstName || '').trim()) + ', your' : 'Your'} account is set up and your progress is saved. You can return at any point and pick up exactly where you left off.</p>
        <button type="button" class="btn btn-primary btn-block" id="btn-return-anytime-stay">Continue my journey</button>
        <button type="button" class="btn btn-secondary btn-block" id="btn-return-anytime-exit">Exit for now</button>
      </div>
    `;
    sheetFooter.style.display = 'none';
    sheetFooter.innerHTML = '';

    document.getElementById('btn-return-anytime-stay').addEventListener('click', () => {
      closeOverlay();
    });
    document.getElementById('btn-return-anytime-exit').addEventListener('click', () => {
      closeOverlay();
      showToast('See you soon — your progress is saved');
      setTimeout(() => {
        history = ['landing'];
        lastDirection = 'back';
        render();
      }, 350);
    });
    return;
  }

  const firstName = (state.contactFirstName || '').trim();
  const lede = isSaveProgress
    ? "Save your progress before payment. We'll email you a magic link to create your account - you can pick up exactly where you left off. A password can be added after payment."
    : (firstName
        ? `${escapeHTML(firstName)}, would you like to save your progress? It makes it super easy to return later without having to start again.`
        : "Don't lose your progress. We can email you a magic link so you can pick up exactly where you left off.");

  const secondaryLabel = isSaveProgress ? 'Continue without saving' : 'Exit without saving';

  sheetBody.innerHTML = `
    <div class="exit-save">
      <p class="exit-save-lede">${lede}</p>

      <div class="exit-save-section">
        <label class="exit-save-label" for="exit-save-email">Email address</label>
        <input type="email" id="exit-save-email" class="exit-save-input" placeholder="you@example.com" autocomplete="email" />
        <p class="exit-save-hint">We'll only use this to send you the link to resume.</p>
        <button type="button" class="btn btn-primary btn-block" id="btn-send-magic-link">Send me a magic link</button>
      </div>

      <div class="exit-save-divider"><span>or</span></div>

      <button type="button" class="btn btn-secondary btn-block" id="btn-exit-no-save">${secondaryLabel}</button>
    </div>
  `;

  sheetFooter.style.display = 'none';
  sheetFooter.innerHTML = '';

  const emailEl = document.getElementById('exit-save-email');
  emailEl.focus();

  // Manually closes the overlay WITHOUT re-rendering the underlying screen,
  // so the next navigation (e.g. goNext to payment) doesn't flash the
  // fulfilment page in between.
  const closeOverlaySilently = () => {
    const overlay = document.getElementById('overlay');
    overlay.classList.remove('open');
    overlay.setAttribute('aria-hidden', 'true');
    state.overlayType = null;
  };

  document.getElementById('btn-send-magic-link').addEventListener('click', () => {
    const email = emailEl.value.trim();
    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      emailEl.classList.add('error');
      showToast('Enter a valid email address', 'error');
      return;
    }
    if (isSaveProgress) {
      closeOverlaySilently();
      showToast(`Account created - magic link sent to ${email}`);
      // Continue the journey: advance from fulfilment to payment (the
      // saveProgressPrompted flag is already set so it won't re-prompt).
      goNext();
    } else {
      closeOverlay();
      showToast(`Magic link sent to ${email} - check your inbox`);
    }
  });
  document.getElementById('btn-exit-no-save').addEventListener('click', () => {
    if (isSaveProgress) {
      closeOverlaySilently();
      // Skip the email step - continue straight to payment
      goNext();
    } else {
      closeOverlay();
      // Reset journey + return to landing
      history = ['landing'];
      lastDirection = 'back';
      render();
      showToast('Progress cleared');
    }
  });
}

  document.getElementById('product-selected-confirm').addEventListener('click', confirmProductSelection);
}

// Inline tabs used to switch between Home delivery / Store pickup from
// inside either overlay - lets the user change method without leaving the
// page they came from (e.g. Payment).
function fulfilmentTabsHTML(active) {
  return `
    <div class="fulfilment-tabs" role="tablist">
      <button type="button" class="fulfilment-tab ${active === 'home' ? 'active' : ''}" data-fulfilment-tab="home" role="tab">Home delivery</button>
      <button type="button" class="fulfilment-tab ${active === 'store' ? 'active' : ''}" data-fulfilment-tab="store" role="tab">Store pickup</button>
    </div>
  `;
}

function bindFulfilmentTabs() {
  document.querySelectorAll('[data-fulfilment-tab]').forEach(el => {
    el.addEventListener('click', () => {
      const tab = el.dataset.fulfilmentTab;
      const targetOverlay = tab === 'home' ? 'address' : 'store';
      if (state.overlayType === targetOverlay) return;
      state.fulfilment = tab;
      openOverlay(targetOverlay, 'change');
    });
  });
}

// Returns the postcode embedded in the user's delivery address or chosen
// collection store. Empty string if neither is set yet.
function fulfilmentPostcode() {
  let text = '';
  if (state.fulfilment === 'home' && state.address) text = state.address;
  else if (state.fulfilment === 'store' && state.store) text = state.store.addr || '';
  const m = text.match(/[A-Z]{1,2}\d[\dA-Z]?\s*\d[A-Z]{2}/i);
  return m ? m[0].toUpperCase() : '';
}

// ----- Address overlay -----
// Returns the postcode the user already entered for their GP, trimmed.
// Empty string if no valid postcode is set yet.
function gpPostcode() {
  const raw = (state.gpQuery || '').trim();
  if (!raw) return '';
  if (!/^[A-Z]{1,2}\d[\dA-Z]?\s*\d[A-Z]{2}$/i.test(raw)) return '';
  return raw.toUpperCase();
}

// Reusable "Use my GP postcode" pill - shown above postcode lookups in
// the delivery address and store overlays so the user doesn't have to
// retype a postcode they've already provided for their GP.
function gpPostcodeChipHTML() {
  const pc = gpPostcode();
  if (!pc) return '';
  return `
    <button type="button" class="use-gp-postcode-btn" id="btn-use-gp-postcode">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <span>Use my GP postcode <strong>${escapeHTML(pc)}</strong></span>
    </button>
  `;
}

  const sheetBody = document.getElementById('sheet-body');
  const sheetFooter = document.getElementById('sheet-footer');

          </span>

        </div>
        <button class="btn btn-primary" id="btn-ov-lookup" style="height:50px;">Find</button>
      </div>

      ${gpPostcodeChipHTML()}

      </div>

          <label for="m-city">Town / City</label>

function doAddressLookup() {
  const raw = (state.postcodeQuery || '').trim();
  if (!raw) {
    showToast('Enter a postcode', 'error');
    document.querySelector('#sheet-body [data-field="postcode"]')?.classList.add('error');
    return;
  }
  if (!/^[A-Z]{1,2}\d[\dA-Z]?\s*\d[A-Z]{2}$/i.test(raw)) {
    showToast("That doesn't look like a UK postcode", 'error');
    document.querySelector('#sheet-body [data-field="postcode"]')?.classList.add('error');
    return;
  }
  const results = document.getElementById('ov-lookup-results');
  results.innerHTML = renderSkeletonList(4);
  setTimeout(() => {
    state.addressOptions = findAddresses(raw);
    renderAddressOverlayOptions();
  }, 700);
}

function renderAddressOverlayOptions() {
  const results = document.getElementById('ov-lookup-results');
  if (!results) return;
  if (!state.addressOptions.length) {
    results.innerHTML = `
      <div class="empty">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <div class="empty-title">No addresses found</div>
        <div class="empty-text">Try a different postcode, or enter manually.</div>
      </div>
    `;
    return;
  }
  results.innerHTML = `
    <div class="section-h">${state.addressOptions.length} addresses found</div>
    <div class="suggestions">
      ${state.addressOptions.map(a => `
        <div class="suggestion" data-address="${escapeHTML(a)}">${escapeHTML(a)}</div>
      `).join('')}
    </div>
  `;
  results.querySelectorAll('[data-address]').forEach(el => {
    el.addEventListener('click', () => {
      state.address = el.dataset.address;
      // After picking the address the overlay re-renders to the Delivery
      // Options step. For the auto-advance flow the user then picks a
      // delivery speed and that handler advances straight to Payment.
      renderAddressOverlay();
    });
  });
}

// Closes the overlay silently, shows the brief loading state on the
// fulfilment page, then advances to Payment.
function finishFulfilmentAutoAdvance() {
  state.fulfilmentAutoAdvance = false;
  const overlay = document.getElementById('overlay');
  overlay.classList.remove('open');
  overlay.setAttribute('aria-hidden', 'true');
  state.overlayType = null;
  state.fulfilmentLoading = true;
  render();
  setTimeout(() => {
    state.fulfilmentLoading = false;
    if (currentStep() === 'fulfilment') goNext();
  }, 700);
}

  const sheetBody = document.getElementById('sheet-body');

    state.storeQuery = gpPostcode();

function storeResultsHTML() {
  if (!state.storeQuery) {
    return `

        <div class="empty-title">Search to see stores</div>

  if (!state.storeResults.length) {
    return `
      <div class="empty">
        <div class="empty-title">No stores found nearby</div>
        <div class="empty-text">Try a different postcode.</div>
      </div>
    `;
  }
  return `

      ${state.storeResults.map(s => `

            <div class="store-addr">${escapeHTML(s.addr)}</div>

              <span>${s.distance} mi away</span>

            </div>
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

function doStoreSearch() {
  const q = (state.storeQuery || '').trim();
  if (!q) {
    showToast('Enter a postcode', 'error');
    return;
  }
  if (!/^[A-Z]{1,2}\d[\dA-Z]?\s*\d[A-Z]{2}$/i.test(q)) {
    showToast("That doesn't look like a UK postcode", 'error');
    return;
  }
  const out = document.getElementById('ov-store-results');
  out.innerHTML = `
    <div class="section-h">Searching…</div>
    <div class="store-list">
      ${[0,1,2].map(() => `
        <div class="card store-card">
          <div class="skel" style="width:22px;height:22px;border-radius:50%;"></div>
          <div class="store-content">
            <div class="skel" style="height:16px;width:60%;"></div>
            <div class="skel" style="height:13px;width:85%;margin-top:8px;"></div>
          </div>
        </div>
      `).join('')}
    </div>
  `;
  setTimeout(() => {
    const key = q.toUpperCase().replace(/\s+/g, '').slice(0, 4);
    state.storeResults = STORE_DB[key.slice(0,4)] || STORE_DB[key.slice(0,3)] || STORE_DB[key.slice(0,2)] || [];
    state.store = null;
    out.innerHTML = storeResultsHTML();
    bindOverlayStoreSelect();
  }, 800);
}

function bindOverlayStoreSelect() {
  document.querySelectorAll('#ov-store-results [data-store-id]').forEach(el => {
    el.addEventListener('click', () => {
      state.store = state.storeResults.find(s => s.id === el.dataset.storeId);
      // Auto-advance flow: came from the fulfilment tile click - skip the
      // toast + manual close and head straight to Payment with a loading state.
      if (state.fulfilmentAutoAdvance) {
        finishFulfilmentAutoAdvance();
        return;
      }
      showToast(`${state.store.name} selected`, 'success');
      closeOverlay();
    });
  });
}

  ['m-line1','m-city','m-postcode'].forEach(id => {

function lookupPostcode() {
  const raw = (state.postcodeQuery || '').trim();
  if (!raw) {
    showToast('Enter a postcode', 'error');
    document.querySelector('[data-field="postcode"]')?.classList.add('error');

  if (!/^[A-Z]{1,2}\d[\dA-Z]?\s*\d[A-Z]{2}$/i.test(raw)) {
    showToast('That doesn\'t look like a UK postcode', 'error');
    document.querySelector('[data-field="postcode"]')?.classList.add('error');
    return;
  }

  // Show loading state in the results container

function renderAddressOptions() {

  if (!results) return;
  if (!state.addressOptions.length) {
    results.innerHTML = `

        <div class="empty-text">Try a different postcode or enter your address manually.</div>
      </div>
    `;
    return;
  }
  results.innerHTML = `
    <div class="suggestions">
      ${state.addressOptions.map(a => `
        <div class="suggestion" data-address="${escapeHTML(a)}">${escapeHTML(a)}</div>
      `).join('')}

function renderSkeletonList(n) {

function searchStores() {
  const q = (state.storeQuery || '').trim();
  if (!q) {
    showToast('Enter a postcode', 'error');
    return;
  }
  if (!/^[A-Z]{1,2}\d[\dA-Z]?\s*\d[A-Z]{2}$/i.test(q)) {
    showToast('That doesn\'t look like a UK postcode', 'error');
    return;
  }

  const out = document.getElementById('store-results');
  out.innerHTML = `
    <div class="section-h">Searching…</div>
    <div class="store-list">
      ${[0,1,2].map(() => `
        <div class="card store-card">
          <div class="skel" style="width:22px;height:22px;border-radius:50%;"></div>
          <div class="store-content">
            <div class="skel" style="height:16px;width:60%;"></div>
            <div class="skel" style="height:13px;width:85%;margin-top:8px;"></div>
            <div class="skel" style="height:11px;width:50%;margin-top:8px;"></div>
          </div>
        </div>
      `).join('')}
    </div>
  `;

  setTimeout(() => {
    const key = q.toUpperCase().replace(/\s+/g, '').slice(0, 4);
    state.storeResults = STORE_DB[key.slice(0,4)] || STORE_DB[key.slice(0,3)] || STORE_DB[key.slice(0,2)] || [];
    state.store = null;
    out.innerHTML = renderStoreResults();
    bindStoreSelect();
  }, 800);
}

function bindStoreSelect() {
  document.querySelectorAll('[data-store-id]').forEach(el => {
    el.addEventListener('click', () => {
      state.store = state.storeResults.find(s => s.id === el.dataset.storeId);
      document.querySelectorAll('[data-store-id]').forEach(n => n.classList.remove('selected'));
      el.classList.add('selected');
      document.getElementById('btn-next').disabled = !validate('store');
    });
  });
}

  const pmCard = (k) => `
      <div class="ca-method ${state.paymentMethod === k ? 'selected' : ''}" data-pm="${k}" role="button" tabindex="0">

  const allMethods = ['apple', 'paypal', 'card'];
  const visibleMethods = state.paymentMethod ? [state.paymentMethod] : allMethods;

  // Fulfilment must be picked AND have address/store data before payment can be selected

  const homeHasData = homeSel && !!state.address;

  const storeAddr = state.store ? `${state.store.name}, ${state.store.addr}` : '';

    ${`

  // Payment method (radio cards). Switching methods clears any previous auth
  // (so Apple/Google Pay needs a fresh verification each time).
  root.querySelectorAll('[data-pm]').forEach(el => {
    el.addEventListener('click', () => {
      const newMethod = el.dataset.pm;
      const justOpenedCard = newMethod === 'card' && state.paymentMethod !== 'card';
      if (state.paymentMethod !== newMethod) {
        state.paymentAuthorised = false;
      }
      state.paymentMethod = newMethod;
      render();
      // If the user just selected Card, smoothly scroll the form into view so
      // they see the inputs they need to fill in.
      if (justOpenedCard) {
        requestAnimationFrame(() => {
          const form = document.getElementById('card-form');
          if (form) form.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
      }
    });
  });

  // Change links on fulfilment summary - open the relevant overlay rather
  // than navigating away from the payment screen. 'change' context shows
  // the tabbed switcher inside the overlay.
  root.querySelectorAll('[data-change]').forEach(el => {
    el.addEventListener('click', () => openOverlay(el.dataset.change, 'change'));
  });
  // Inline fulfilment selection (Home / Store) cards on the payment page.
  root.querySelectorAll('[data-fulfilment]').forEach(el => {
    el.addEventListener('click', (e) => {
      // Don't re-trigger when clicking the inner Add-address / Select-store button
      if (e.target.closest('[data-open-overlay]')) return;
      const next = el.dataset.fulfilment;
      if (state.fulfilment === next) return;
      state.fulfilment = next;
      // Clear the other side's data so the summary stays consistent
      if (next === 'home') { state.store = null; }
      if (next === 'store') { state.address = null; state.deliverySpeed = null; }
      render();
    });
  });
  root.querySelectorAll('[data-open-overlay]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      openOverlay(el.dataset.openOverlay, 'select');
    });
  });

      e.stopPropagation();
      openOverlay(el.dataset.editOverlay, 'change');
    });
  });

  // Card form binding
  if (state.paymentMethod === 'card') bindCardForm();

  // "Change" link to clear the selected payment method and show all options again
  root.querySelector('#btn-change-pm')?.addEventListener('click', () => {
    state.paymentMethod = null;
    state.paymentAuthorised = false;
    render();
  });

  // Separate Promo + Advantage accordions - track each open/closed state
  // independently so they persist correctly across re-renders.
  root.querySelector('#promo-accordion')?.addEventListener('toggle', (e) => {
    state.promoOpen = e.target.open;
  });
  root.querySelector('#advantage-accordion')?.addEventListener('toggle', (e) => {
    state.advantageOpen = e.target.open;
  });
  root.querySelector('#promo-code-input')?.addEventListener('input', (e) => {
    state.promoCode = e.target.value;
  });
  root.querySelector('#promo-code-apply')?.addEventListener('click', () => {
    if (!state.promoCode.trim()) return showToast('Enter a promo code', 'error');
    showToast(`Promo code "${state.promoCode}" applied`);
    render();
  });
  root.querySelector('#advantage-input')?.addEventListener('input', (e) => {
    state.advantageNumber = e.target.value;
  });
  root.querySelector('#advantage-apply')?.addEventListener('click', () => {
    if (!state.advantageNumber.trim()) return showToast('Enter your Advantage card number', 'error');
    showToast('Advantage card added - points will be applied when your order ships');
    render();
  });
  // Scan-barcode shortcut on the Advantage card field. Simulates a camera
  // scan: shows a brief overlay, then auto-fills a sample card number.
  root.querySelector('#advantage-scan')?.addEventListener('click', () => {
    openOverlay('advantage-scan');
  });
}

      <div class="field stripe-field" data-field="card-expiry">

        </div>
        <div class="err">Invalid or expired</div>
      </div>

          </span>

        <div class="err">3 or 4 digits</div>
      </div>

  `;
}

function bindCardForm() {
  const numEl = document.getElementById('card-num');
  numEl.addEventListener('input', () => {
    let digits = numEl.value.replace(/\D/g, '').slice(0, 19);
    state.card.number = digits.replace(/(.{4})/g, '$1 ').trim();
    numEl.value = state.card.number;

    // Refresh inline Stripe-style brand badges - dim the non-matching ones
    const brand = detectCardBrand(state.card.number);
    const order = ['visa','mastercard','amex'];
    document.querySelectorAll('.stripe-brands .stripe-brand').forEach((b, i) => {
      b.classList.toggle('dim', !!brand && order[i] !== brand);
    });
    numEl.closest('.field')?.classList.remove('error');
    document.getElementById('btn-next').disabled = !validate('payment');
    document.getElementById('btn-next').textContent = nextLabel('payment');
  });

  const expEl = document.getElementById('card-exp');
  expEl.addEventListener('input', () => {
    let v = expEl.value.replace(/\D/g, '').slice(0, 4);
    if (v.length >= 3) v = v.slice(0,2) + ' / ' + v.slice(2);
    else if (v.length === 2) v = v + ' / ';
    expEl.value = v;
    state.card.expiry = v;
    expEl.closest('.field')?.classList.remove('error');
    document.getElementById('btn-next').disabled = !validate('payment');
  });

  const cvvEl = document.getElementById('card-cvv');
  cvvEl.addEventListener('input', () => {
    cvvEl.value = cvvEl.value.replace(/\D/g, '').slice(0, 4);
    state.card.cvv = cvvEl.value;
    cvvEl.closest('.field')?.classList.remove('error');
    document.getElementById('btn-next').disabled = !validate('payment');
  });


}

function renderPhotoCapture(root, opts) {
  const { stateKey, type, title, lede, dotIndex } = opts;
  // type: 'id' | 'body-front' | 'body-side'

  if (!state.photoSession) state.photoSession = {};
  const taken = !!state[stateKey];
  if (!state.photoSession[stateKey]) {
    state.photoSession[stateKey] = taken ? 'confirmed' : 'camera';
  }
  const phase = state.photoSession[stateKey];

  // Clear any pending timers for this photo (including AI-check timers)
  ['_align', '_cap', '_post', '_cd2', '_cd1', '_ai1', '_ai2'].forEach(sfx => {
    const k = stateKey + sfx;
    if (_photoTimers[k]) { clearTimeout(_photoTimers[k]); delete _photoTimers[k]; }
  });

  const isBody = type === 'body-front' || type === 'body-side';
  const vfH = isBody ? '344px' : '230px';
  const screenLabel = title || (type === 'body-side' ? 'Side view' : type === 'body-front' ? 'Front view' : 'Document');

  const guideHtml = isBody
    ? `<div class="cam-guide-body-el" id="cam-guide-${stateKey}">${type === 'body-side' ? BODY_SIDE_OUTLINE : BODY_FRONT_OUTLINE}</div>`
    : `<div class="cam-guide-card" id="cam-guide-${stateKey}"></div>`;

  // — Review state —
  if (phase === 'reviewing') {
    root.innerHTML = `
      ${(!isBody && lede) ? `<p class="lede" style="margin-bottom:12px;">${escapeHTML(lede)}</p>` : ''}
      <div class="cam-review-frame" style="min-height:${vfH};">
        <div class="cam-review-bg"></div>
        <div class="cam-review-content">
          <div class="cam-review-tick">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <div class="cam-review-label">Photo captured</div>
        </div>
      </div>
      <p style="font-size:13px;color:var(--muted);text-align:center;margin:-4px 0 14px;">Check the photo is clear and in focus.</p>
      <div class="cam-review-actions">
        <button type="button" class="cam-btn-retake" id="btn-retake-${stateKey}">Retake</button>
        <button type="button" class="cam-btn-confirm" id="btn-confirm-${stateKey}">Use this photo</button>
      </div>`;
    root.querySelector(`#btn-confirm-${stateKey}`)?.addEventListener('click', () => {
      state[stateKey] = true;
      state.photoSession[stateKey] = 'confirmed';
      render();
    });
    root.querySelector(`#btn-retake-${stateKey}`)?.addEventListener('click', () => {
      state.photoSession[stateKey] = 'camera';
      render();
    });
    return;
  }

  // — Confirmed state —
  if (phase === 'confirmed') {
    const isIdPhoto = type === 'id';
    root.innerHTML = `
      ${(!isBody && lede) ? `<p class="lede" style="margin-bottom:12px;">${escapeHTML(lede)}</p>` : ''}
      <div class="cam-confirmed-frame">
        <div class="cam-confirmed-icon">
          <div class="cam-confirmed-tick">
            <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <div class="cam-confirmed-label">Photo saved</div>
        </div>
      </div>
      ${!isIdPhoto ? `<button type="button" class="btn btn-secondary btn-block" id="btn-retake-conf-${stateKey}">Retake photo</button>` : ''}`;
    root.querySelector(`#btn-retake-conf-${stateKey}`)?.addEventListener('click', () => {
      state[stateKey] = false;
      state.photoSession[stateKey] = 'camera';
      render();
    });
    return;
  }

  // — Camera / aligning phase —
  if (isBody) {
    // Build BMI ruler ticks
    let ticksHtml = '';
    for (let i = 0; i < 11; i++) ticksHtml += '<div class="cam-bmi-tick"></div>';

    // Build progress dots (always 2 dots for body photos)
    const dot1Active = dotIndex === 1 ? ' active' : '';
    const dot2Active = dotIndex === 2 ? ' active' : '';

    root.innerHTML = `
      <div class="cam-vf" id="cam-vf-${stateKey}" style="min-height:${vfH};position:relative;">
        <div class="cam-vf-bg"></div>
        <div class="cam-top-label">${escapeHTML(screenLabel)}</div>
        <div class="cam-corners">
          <div class="cam-corner-mark tl"></div><div class="cam-corner-mark tr"></div>
          <div class="cam-corner-mark bl"></div><div class="cam-corner-mark br"></div>
        </div>
        <div class="cam-bmi-ruler">${ticksHtml}</div>
        <div class="cam-portrait-frame" id="cam-pf-${stateKey}"></div>
        <div class="cam-hint-bar" id="cam-hint-${stateKey}">
          <strong>Stand with your full body in frame</strong>
          Keep arms slightly away from your sides
        </div>
        <div class="cam-dots">
          <div class="cam-dot${dot1Active}"></div>
          <div class="cam-dot${dot2Active}"></div>
        </div>
      </div>
      <div class="cam-shutter-wrap">
        <div class="cam-shutter"><div class="cam-shutter-inner"></div></div>
      </div>`;

    // Body photo countdown sequence
    // After 1.8s → aligned, show "3"
    _photoTimers[stateKey + '_align'] = setTimeout(() => {
      const pf   = document.getElementById('cam-pf-'   + stateKey);
      const hint = document.getElementById('cam-hint-'  + stateKey);
      const vf   = document.getElementById('cam-vf-'   + stateKey);
      if (!vf) return;

      pf?.classList.add('aligned');
      if (hint) hint.innerHTML = `<strong style="color:#00da5a;">&#10003; Aligned &mdash; hold still</strong>`;

      // Show countdown "3"
      const countdown = document.createElement('div');
      countdown.className = 'cam-countdown';
      countdown.id = 'cam-cd-' + stateKey;
      countdown.textContent = '3';
      vf.appendChild(countdown);

      // After 600ms → "2"
      _photoTimers[stateKey + '_cd2'] = setTimeout(() => {
        const cd = document.getElementById('cam-cd-' + stateKey);
        if (cd) { cd.remove(); }
        const vf2 = document.getElementById('cam-vf-' + stateKey);
        if (!vf2) return;
        const cd2 = document.createElement('div');
        cd2.className = 'cam-countdown';
        cd2.id = 'cam-cd-' + stateKey;
        cd2.textContent = '2';
        vf2.appendChild(cd2);

        // After 600ms → "1"
        _photoTimers[stateKey + '_cd1'] = setTimeout(() => {
          const cd2el = document.getElementById('cam-cd-' + stateKey);
          if (cd2el) { cd2el.remove(); }
          const vf3 = document.getElementById('cam-vf-' + stateKey);
          if (!vf3) return;
          const cd3 = document.createElement('div');
          cd3.className = 'cam-countdown';
          cd3.id = 'cam-cd-' + stateKey;
          cd3.textContent = '1';
          vf3.appendChild(cd3);

          // After 600ms → flash + capture
          _photoTimers[stateKey + '_cap'] = setTimeout(() => {
            const cd3el = document.getElementById('cam-cd-' + stateKey);
            if (cd3el) cd3el.remove();
            const vfFinal = document.getElementById('cam-vf-' + stateKey);
            if (!vfFinal) return;
            const flash = document.createElement('div');
            flash.className = 'cam-flash';
            vfFinal.appendChild(flash);

            _photoTimers[stateKey + '_post'] = setTimeout(() => {
              // Show AI quality-check overlay then auto-advance
              const vfEl = document.getElementById('cam-vf-' + stateKey);
              if (!vfEl) return;
              const aiOverlay = document.createElement('div');
              aiOverlay.className = 'cam-ai-check';
              aiOverlay.innerHTML = `
                <div class="cam-ai-ring"></div>
                <div class="cam-ai-label">Checking photo quality&hellip;</div>`;
              vfEl.appendChild(aiOverlay);

              _photoTimers[stateKey + '_ai1'] = setTimeout(() => {
                aiOverlay.innerHTML = `
                  <div class="cam-ai-accepted-icon">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                  </div>
                  <div class="cam-ai-label cam-ai-label--ok">Photo accepted</div>`;

                _photoTimers[stateKey + '_ai2'] = setTimeout(() => {
                  // Only auto-advance if we're still on this camera step
                  const expectedStep = stateKey === 'bodyPhotoFront' ? 'photos-front' : 'photos-side';
                  if (currentStep() !== expectedStep) return;
                  if (!state.photoSession) state.photoSession = {};
                  state[stateKey] = true;
                  state.photoSession[stateKey] = 'confirmed';
                  goNext();
                }, 800);
              }, 1500);
            }, 350);
          }, 600);
        }, 600);
      }, 600);
    }, 1800);

  }
}

function jumpToScreen(screen) {
  // Cancel any in-flight photo capture timers when navigating away
  Object.keys(_photoTimers).forEach(k => { clearTimeout(_photoTimers[k]); delete _photoTimers[k]; });

  const overlay = document.getElementById('overlay');

  // Marketing landing page, start of everything
  if (screen === 'landing') {
    overlay?.classList.remove('open');
    history = ['landing'];
    lastDirection = 'forward';
    render();
    refreshPicker();
    return;
  }
  // Question 1: experience
  if (screen === 'q-experience') {
    overlay?.classList.remove('open');
    history = ['landing', 'q-experience'];
    lastDirection = 'forward';
    render();
    refreshPicker();
    return;
  }
  // Question 2: reasons, pre-set the experience answer so the deep link
  // lands here cleanly (the user can still change Q1 via the back button).
  if (screen === 'q-reasons') {
    overlay?.classList.remove('open');
    if (!state.usedBefore) state.usedBefore = 'new';
    history = ['landing', 'q-experience', 'q-reasons'];
    lastDirection = 'forward';
    render();
    refreshPicker();
    return;
  }
  // Soft intro / reassurance, pre-fill earlier answers so deep linking works
  if (screen === 'q-intro') {
    overlay?.classList.remove('open');
    if (!state.usedBefore) state.usedBefore = 'new';
    history = ['landing', 'q-experience', 'q-intro'];
    lastDirection = 'forward';
    render();
    refreshPicker();
    return;
  }
  // Core medical questions, pre-fill earlier answers so deep linking works
  if (['q-height-weight','q-gender','q-ethnicity','q-name','q-medical-tbd'].includes(screen)) {
    overlay?.classList.remove('open');
    if (!state.usedBefore) state.usedBefore = 'new';
    if (!state.lossReasons.length) state.lossReasons = ['health'];
    state.disclaimers = { agreed: true };
    const order = ['landing','q-experience','q-reasons','disclaimer','q-height-weight','q-gender','q-ethnicity','q-name','q-medical-tbd'];
    history = order.slice(0, order.indexOf(screen) + 1);
    lastDirection = 'forward';
    render();
    refreshPicker();
    return;
  }

  // Analysing is a special "pre-journey" screen - re-trigger the animation
  if (screen === 'analysing') {
    overlay?.classList.remove('open');
    history = ['analysing'];
    lastDirection = 'forward';
    render();
    runAnalysing();
    refreshPicker();
    return;
  }

  // Disclaimer is the start of the journey
  if (screen === 'disclaimer') {
    overlay?.classList.remove('open');
    history = ['disclaimer'];
    lastDirection = 'forward';
    render();
    refreshPicker();
    return;
  }
  // GP details now sits after Payment set up (confirmation) as the final
  // post-purchase step.
  if (screen === 'gp') {
    document.getElementById('overlay')?.classList.remove('open');
    state.disclaimers = { agreed: true };
    if (!state.product) state.product = 'mounjaro';
    if (!state.fulfilment) state.fulfilment = 'home';
    if (state.fulfilment === 'home' && !state.address) state.address = '12 Park Walk, London, SW10 0LE';
    if (state.fulfilment === 'home' && !state.deliverySpeed) state.deliverySpeed = 'standard';
    if (!state.paymentMethod) state.paymentMethod = 'card';
    if (!state.orderRef) state.orderRef = 'BOD-WL-' + Math.floor(40000 + Math.random() * 9999);
    history = ['product', 'upsell', 'product-upsell', 'create-account', 'account-details', 'fulfilment', 'payment', 'processing', 'confirmation', 'gp'];
    lastDirection = 'forward';
    render();
    refreshPicker();
    return;
  }

  // Photo ID Verification — shown after GP selection
  if (screen === 'photo-id') {
    document.getElementById('overlay')?.classList.remove('open');
    state.disclaimers = { agreed: true };
    if (!state.product) state.product = 'mounjaro';
    if (!state.fulfilment) state.fulfilment = 'home';
    if (state.fulfilment === 'home' && !state.address) state.address = '12 Park Walk, London, SW10 0LE';
    if (state.fulfilment === 'home' && !state.deliverySpeed) state.deliverySpeed = 'standard';
    if (!state.paymentMethod) state.paymentMethod = 'card';
    if (!state.orderRef) state.orderRef = 'BOD-WL-' + Math.floor(40000 + Math.random() * 9999);
    if (!state.gp) state.gp = { name: 'General Practice', postcode: 'SW10' };
    history = ['product', 'upsell', 'product-upsell', 'create-account', 'account-details', 'fulfilment', 'payment', 'processing', 'confirmation', 'gp', 'photo-id'];
    lastDirection = 'forward';
    render();
    refreshPicker();
    return;
  }

  // GP Disclaimer — shown after GP details
  if (screen === 'gp-disclaimer') {
    document.getElementById('overlay')?.classList.remove('open');
    state.disclaimers = { agreed: true, gp_agreed: false, gp_items: { mounjaro_alcohol: false, mounjaro_pancreatitis: false, mounjaro_hypoglycaemia: false, weightloss_sideeffects: false, weightloss_resources: false } };
    if (!state.product) state.product = 'mounjaro';
    if (!state.fulfilment) state.fulfilment = 'home';
    if (state.fulfilment === 'home' && !state.address) state.address = '12 Park Walk, London, SW10 0LE';
    if (state.fulfilment === 'home' && !state.deliverySpeed) state.deliverySpeed = 'standard';
    if (!state.paymentMethod) state.paymentMethod = 'card';
    if (!state.orderRef) state.orderRef = 'BOD-WL-' + Math.floor(40000 + Math.random() * 9999);
    if (!state.gp) state.gp = { name: 'General Practice', postcode: 'SW10' };
    history = ['product', 'upsell', 'product-upsell', 'create-account', 'account-details', 'fulfilment', 'payment', 'processing', 'confirmation', 'gp', 'gp-disclaimer'];
    lastDirection = 'forward';
    render();
    refreshPicker();
    return;
  }

  // For everything else, ensure disclaimers + GP are pre-filled so deep links work
  state.disclaimers = { agreed: true };
  if (!state.gp) state.gp = (GP_DB['SW10'] || [])[1];

  // Pre-fill state with sensible defaults so the picked screen renders fully
  if (!state.product) state.product = 'mounjaro';
  // Name is captured at the q-name step; pre-fill it so personalised copy
  // (e.g. the Choose Treatment heading, save-progress prompt) renders on
  // deep-linked screens from product onwards.
  if (!state.contactFirstName) state.contactFirstName = 'Alex';

  // Address/store are now overlays on the fulfilment screen - jump there and open
  if (screen === 'address') {
    state.fulfilment = 'home';
    history = ['product', 'upsell', 'product-upsell', 'create-account', 'account-details', 'fulfilment'];
    lastDirection = 'forward';
    render();
    requestAnimationFrame(() => openOverlay('address'));
    return;
  }
  if (screen === 'store') {
    state.fulfilment = 'store';
    history = ['product', 'upsell', 'product-upsell', 'create-account', 'account-details', 'fulfilment'];
    lastDirection = 'forward';
    render();
    requestAnimationFrame(() => openOverlay('store'));
    return;
  }

  // Pre-seed fulfilment (delivery or collection) data for any screen from
  // Payment onwards, so deep-linking forward never lands on a screen with
  // an empty address / store reference.
  if (['payment','processing','confirmation','gp','photos-intro','photos-front-guide','photos-front','photos-side-guide','photos-side','review-submit','account'].includes(screen)) {
    if (!state.fulfilment) state.fulfilment = 'home';
    if (state.fulfilment === 'home' && !state.address) {
      state.address = '12 Park Walk, London, SW10 0LE';
    }
    if (state.fulfilment === 'home' && !state.deliverySpeed) {
      state.deliverySpeed = 'standard';
    }
    if (state.fulfilment === 'store' && !state.store) {
      state.storeQuery = 'SW10 0LE';
      state.storeResults = STORE_DB['SW10'] || [];
      state.store = state.storeResults[1] || state.storeResults[0];
    }
  }

  // Pre-seed the combined Create-account form (name + email + method +
  // consent) when deep-linking past it.
  if (['payment','processing','confirmation','gp','photos-intro','photos-front-guide','photos-front','photos-side-guide','photos-side','review-submit','account'].includes(screen)) {
    if (!state.contactFirstName) state.contactFirstName = 'Alex';
    if (!state.contactLastName)  state.contactLastName  = 'Bradbury';
    if (!state.contactEmail)     state.contactEmail     = 'alex@gmail.com';
    if (!state.signInMethod)     state.signInMethod     = 'passkey';
    state.accountCreated = true;
  }

  // Pre-seed a payment method for any screen at or after Processing so the
  // downstream views (Confirmation, Account, Review & Submit) have a method
  // to display rather than an empty placeholder.
  if (['processing','confirmation','gp','photos-intro','photos-front-guide','photos-front','photos-side-guide','photos-side','review-submit','account'].includes(screen)) {
    if (!state.paymentMethod) state.paymentMethod = 'card';
    if (state.paymentMethod === 'card') {
      Object.assign(state.card, {
        number: '4242 4242 4242 4242',
        expiry: '12 / 29',
        cvv: '123',
        name: 'A Bradbury',
        postcode: 'SW10 0LE',
      });
    }
  }

  if (screen === 'confirmation' && !state.orderRef) {
    state.orderRef = 'BOD-WL-' + Math.floor(40000 + Math.random() * 9999);
  }

  // Pre-seed photo state for deep links into the post-GP flow so each screen
  // can render in its "complete" state if the user deep-links forward.
  if (['photos-side-guide','photos-side','review-submit','clinician-submit','account'].includes(screen)) {
    if (!state.bodyPhotoFront) state.bodyPhotoFront = true;
  }
  if (['review-submit','clinician-submit','account'].includes(screen)) {
    if (!state.bodyPhotoSide) state.bodyPhotoSide = true;
  }
  if (screen === 'account' && !state.gp) {
    state.gp = { name: 'Park Walk Surgery', addr: '5 Park Walk, London, SW10 0AJ' };
  }

  if (screen === 'product-details') {
    state.viewingProduct = state.viewingProduct || state.product || 'mounjaro';
  }

  // Close overlay if it was open from a previous jump
  document.getElementById('overlay').classList.remove('open');

  const stacks = {
    'product':         ['product'],
    'product-details': ['product', 'product-details'],
    'upsell':          ['product', 'upsell'],
    'product-upsell':  ['product', 'upsell', 'product-upsell'],
    'create-account':  ['product', 'upsell', 'product-upsell', 'create-account'],
    'account-details':  ['product', 'upsell', 'product-upsell', 'create-account', 'account-details'],
    'fulfilment':      ['product', 'upsell', 'product-upsell', 'create-account', 'account-details', 'fulfilment'],
    'payment':         ['product', 'upsell', 'product-upsell', 'create-account', 'account-details', 'fulfilment', 'payment'],
    'processing':      ['product', 'upsell', 'product-upsell', 'create-account', 'account-details', 'fulfilment', 'payment', 'processing'],
    'confirmation':    ['product', 'upsell', 'product-upsell', 'create-account', 'account-details', 'fulfilment', 'payment', 'processing', 'confirmation'],
    'photos-intro':       ['product', 'upsell', 'product-upsell', 'create-account', 'account-details', 'fulfilment', 'payment', 'processing', 'confirmation', 'gp', 'photos-intro'],
    'photos-front-guide': ['product', 'upsell', 'product-upsell', 'create-account', 'account-details', 'fulfilment', 'payment', 'processing', 'confirmation', 'gp', 'photos-intro', 'photos-front-guide'],
    'photos-front':       ['product', 'upsell', 'product-upsell', 'create-account', 'account-details', 'fulfilment', 'payment', 'processing', 'confirmation', 'gp', 'photos-intro', 'photos-front-guide', 'photos-front'],
    'photos-side-guide':  ['product', 'upsell', 'product-upsell', 'create-account', 'account-details', 'fulfilment', 'payment', 'processing', 'confirmation', 'gp', 'photos-intro', 'photos-front-guide', 'photos-front', 'photos-side-guide'],
    'photos-side':        ['product', 'upsell', 'product-upsell', 'create-account', 'account-details', 'fulfilment', 'payment', 'processing', 'confirmation', 'gp', 'photos-intro', 'photos-front-guide', 'photos-front', 'photos-side-guide', 'photos-side'],
    'review-submit':      ['product', 'upsell', 'product-upsell', 'create-account', 'account-details', 'fulfilment', 'payment', 'processing', 'confirmation', 'gp', 'photos-intro', 'photos-front-guide', 'photos-front', 'photos-side-guide', 'photos-side', 'review-submit'],
    'clinician-submit':   ['product', 'upsell', 'product-upsell', 'create-account', 'account-details', 'fulfilment', 'payment', 'processing', 'confirmation', 'gp', 'photos-intro', 'photos-front-guide', 'photos-front', 'photos-side-guide', 'photos-side', 'review-submit', 'clinician-submit'],
    'submitting':         ['product', 'upsell', 'product-upsell', 'create-account', 'account-details', 'fulfilment', 'payment', 'processing', 'confirmation', 'gp', 'photos-intro', 'photos-front-guide', 'photos-front', 'photos-side-guide', 'photos-side', 'review-submit', 'clinician-submit', 'submitting'],
    'account':            ['product', 'upsell', 'product-upsell', 'create-account', 'account-details', 'fulfilment', 'payment', 'processing', 'confirmation', 'gp', 'photos-intro', 'photos-front-guide', 'photos-front', 'photos-side-guide', 'photos-side', 'review-submit', 'clinician-submit', 'account'],
  };
  history = stacks[screen] || ['product'];
  lastDirection = 'forward';
  render();
  refreshPicker();
}

function refreshPicker() {
  const step = currentStep();
  const onMedical = step === 'q-medical-tbd';
  const medIdx = state.medicalStep || 0;
  const group = document.getElementById('picker-medical-group');

  document.querySelectorAll('.picker-btn[data-jump]').forEach(btn => {
    const medStepAttr = btn.dataset.medicalStep;
    if (medStepAttr !== undefined) {
      // Child button: active only when on this exact medical sub-step
      btn.classList.toggle('active', onMedical && parseInt(medStepAttr, 10) === medIdx);
    } else {
      btn.classList.toggle('active', btn.dataset.jump === step);
    }
  });

  // Auto-open medical group and handle parent toggle active state
  if (group) {
    if (onMedical) group.classList.add('open');
    const toggle = document.getElementById('picker-medical-toggle');
    if (toggle) {
      // Toggle shows active only when group is closed and we're on a medical screen
      toggle.classList.toggle('active', onMedical && !group.classList.contains('open'));
    }
  }
}

const _dlIcon = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`;
const _spinIcon = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>`;

// Inject download icon into every picker-btn and wire up navigation click
document.querySelectorAll('.picker-btn[data-jump]').forEach(btn => {
  const step = btn.dataset.jump;
  const medStep = btn.dataset.medicalStep;
  const dlAttrs = `data-dl-step="${step}"${medStep !== undefined ? ` data-dl-medical-step="${medStep}"` : ''}`;
  // Wrap existing label content
  btn.innerHTML = `<span class="picker-btn-left">${btn.innerHTML}</span><span class="picker-btn-dl" ${dlAttrs} title="Download PNG">${_dlIcon}</span>`;
  // Navigation click (ignore if clicking the dl icon)
  btn.addEventListener('click', (e) => {
    if (e.target.closest('.picker-btn-dl')) return;
    if (medStep !== undefined) {
      const ms = parseInt(medStep, 10);
      state.medicalStep = ms;
      // Pre-seed parent answers so deep-linked child questions render
      const q = MEDICAL_QUESTIONS[ms];
      if (q && q.parentId && !state.medicalAnswers[q.parentId]) {
        state.medicalAnswers[q.parentId] = q.parentValue;
      }
    }
    jumpToScreen(step);
  });
});

document.getElementById('picker-medical-toggle')?.addEventListener('click', () => {
  const group = document.getElementById('picker-medical-group');

  group.classList.toggle('open');

    state.medicalStep = 0;
    jumpToScreen('q-medical-tbd');

// Per-screen PNG download handler
document.querySelectorAll('.picker-btn-dl').forEach(dl => {
  dl.addEventListener('click', async (e) => {
    e.stopPropagation();
    if (dl.classList.contains('busy')) return;
    const step = dl.dataset.dlStep;
    const dlMedStep = dl.dataset.dlMedicalStep;
    dl.classList.add('busy');
    dl.innerHTML = _spinIcon;
    try {
      if (dlMedStep !== undefined) state.medicalStep = parseInt(dlMedStep, 10);
      await captureAndDownloadStep(step);
    } finally {
      dl.classList.remove('busy');
      dl.innerHTML = _dlIcon;
    }
  });
});

async function captureAndDownloadStep(step) {
  // Load html2canvas if not already loaded
  await loadScript('https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js');

  // Navigate to the target screen
  jumpToScreen(step);
  await _wait(900);

  // Capture full-length, no phone frame (captureCurrentScreen strips bezel)
  const canvas = await captureCurrentScreen();
  const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
  if (!blob) return;

  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${step}.png`;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 1000);
}
