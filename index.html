function loadScript(src) {
  return new Promise((resolve, reject) => {
    if (document.querySelector(`script[data-src="${src}"]`)) return resolve();
    const s = document.createElement('script');
    s.src = src; s.dataset.src = src;
    s.onload = resolve;
    s.onerror = () => reject(new Error('Failed to load ' + src));
    document.head.appendChild(s);
  });
}

const _wait = (ms) => new Promise(r => setTimeout(r, ms));

async function captureCurrentScreen() {
  const device = document.getElementById('device');
  const bodyEl = document.getElementById('body');
  const overlay = document.getElementById('overlay');
  const overlayOpen = overlay.classList.contains('open');

  // Save styles to restore after capture
  const orig = {
    deviceHeight: device.style.height,
    deviceMaxHeight: device.style.maxHeight,
    deviceBoxShadow: device.style.boxShadow,
    deviceBorderRadius: device.style.borderRadius,
    bodyOverflow: bodyEl.style.overflow,
    bodyHeight: bodyEl.style.height,
    bodyMaxHeight: bodyEl.style.maxHeight,
    overlayHeight: '',
    sheetTransition: '',
  };

  // Freeze all CSS animations & transitions so html2canvas captures the fully
  // settled state — without this the .screen slideIn (opacity 0→1) can
  // re-trigger when the layout changes, making the capture look faded.
  const freezeStyle = document.createElement('style');
  freezeStyle.id = '_cap-freeze';
  freezeStyle.textContent = '*, *::before, *::after { animation: none !important; transition: none !important; }';
  document.head.appendChild(freezeStyle);

  // Strip the phone bezel + clip - capture the page itself, not the device chrome
  device.style.boxShadow = 'none';
  device.style.borderRadius = '0';
  device.style.maxHeight = 'none';
  bodyEl.style.overflow = 'visible';
  bodyEl.style.height = 'auto';
  bodyEl.style.maxHeight = 'none';
  device.style.height = 'auto';

  // If an overlay is open, also expand its sheet so the full overlay content is captured
  let sheet, sheetBody;
  if (overlayOpen) {
    sheet = device.querySelector('.sheet');
    sheetBody = document.getElementById('sheet-body');
    if (sheet) {
      orig.overlayHeight = sheet.style.height;
      orig.sheetTransition = sheet.style.transition;
      sheet.style.transition = 'none';
    }
  }

  await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
  await _wait(120);

  const canvas = await window.html2canvas(device, {
    backgroundColor: '#ffffff',
    scale: 2,
    useCORS: true,
    allowTaint: false,
    logging: false,
    width: device.offsetWidth,
    height: device.offsetHeight,
    windowWidth: device.offsetWidth,
    windowHeight: device.offsetHeight,
  });

  // Restore
  device.style.height = orig.deviceHeight;
  device.style.maxHeight = orig.deviceMaxHeight;
  device.style.boxShadow = orig.deviceBoxShadow;
  device.style.borderRadius = orig.deviceBorderRadius;
  bodyEl.style.overflow = orig.bodyOverflow;
  bodyEl.style.height = orig.bodyHeight;
  bodyEl.style.maxHeight = orig.bodyMaxHeight;
  if (sheet) {
    sheet.style.height = orig.overlayHeight;
    sheet.style.transition = orig.sheetTransition;
  }

  // Re-enable animations & transitions
  document.getElementById('_cap-freeze')?.remove();

  return canvas;
}

async function downloadAllScreens() {
  const btn = document.getElementById('picker-export');
  if (btn.disabled) return;
  btn.disabled = true;
  const originalLabel = btn.textContent;
  btn.textContent = 'Loading libraries…';

  try {
    await Promise.all([
      loadScript('https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js'),
      loadScript('https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js'),
    ]);

    // Stash current state so we can restore at the end
    const stashedHistory = [...history];
    const stashedOverlay = state.overlayType;
    document.getElementById('overlay').classList.remove('open');

    const zip = new window.JSZip();

    for (let i = 0; i < EXPORT_SCREENS.length; i++) {
      const { name, route } = EXPORT_SCREENS[i];
      btn.textContent = `Capturing ${i + 1}/${EXPORT_SCREENS.length}…`;

      const fn = HASH_ROUTES[route];
      if (!fn) continue;
      fn();

      // Allow render + overlay slide-in + image loads
      await _wait(900);

      try {
        const canvas = await captureCurrentScreen();
        const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
        if (blob) zip.file(`${name}.png`, blob);
      } catch (err) {
        console.warn('Failed to capture ' + name, err);
      }
    }

    btn.textContent = 'Building ZIP…';
    const zipBlob = await zip.generateAsync({ type: 'blob' });

    const url = URL.createObjectURL(zipBlob);
    const a = document.createElement('a');
    const stamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
    a.href = url;
    a.download = `weight-loss-checkout-${stamp}.zip`;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 1000);

    // Restore previous state
    history = stashedHistory;
    document.getElementById('overlay').classList.remove('open');
    if (stashedOverlay) state.overlayType = stashedOverlay;
    render();
    refreshPicker();
  } catch (err) {
    console.error(err);
    alert('Export failed: ' + (err && err.message ? err.message : err));
  } finally {
    btn.disabled = false;
    btn.textContent = originalLabel;
  }
}

document.getElementById('picker-export').addEventListener('click', downloadAllScreens);

// ---------------------------------------------------------------------------
// Responsive view - opened in its own tab via the picker link `?view=web`,
// or toggled at any time via the floating Phone/Web pill in the top-right.
// When active, strip the phone chrome AND the prototype navigator so the
// page reads as a normal responsive website.
// ---------------------------------------------------------------------------
{
  const params = new URLSearchParams(window.location.search);
  const isEmbed = params.get('embed') === '1';
  const isWeb = params.get('view') === 'web';
  if (isWeb && !isEmbed) document.body.classList.add('web-view');

  // Prototype-navigator toggle (under Reset flow) - flips the no-phone-frame
  // class which strips only the device chrome (frame, status bar, notch,
  // floating back). It does NOT switch to the responsive web view - the
  // navigator + stage layout stay exactly the same.
  const frameToggle = document.getElementById('picker-frame-toggle');
  const frameToggleLabel = document.getElementById('picker-frame-toggle-label');
  if (frameToggle && frameToggleLabel) {
    const sync = () => {
      const hidden = document.body.classList.contains('no-phone-frame');
      frameToggle.classList.toggle('active', hidden);
      frameToggle.setAttribute('aria-pressed', String(hidden));
      frameToggleLabel.textContent = hidden ? 'Show phone frame' : 'Hide phone frame';
    };
    sync();
    frameToggle.addEventListener('click', () => {
      document.body.classList.toggle('no-phone-frame');
      sync();
    });
  }

  // Treatment-list view segment (Stacked / Carousel)
  document.querySelectorAll('[data-product-view]').forEach(btn => {
    btn.addEventListener('click', () => {
      const view = btn.dataset.productView;
      if (view === productListView) return;
      productListView = view;
      productCarouselIndex = 0;
      document.querySelectorAll('[data-product-view]').forEach(b => {
        b.classList.toggle('active', b.dataset.productView === view);
      });
      // Re-render only if currently on the Choose Treatment screen
      if (currentStep() === 'product') render();
    });
  });

  // Treatment-page scenario sub-nav (no/some/many medical restrictions)
  document.querySelectorAll('[data-scenario]').forEach(btn => {
    btn.addEventListener('click', () => {
      const scenario = btn.dataset.scenario;
      if (scenario === treatmentScenario) return;
      treatmentScenario = scenario;
      productCarouselIndex = 0;
      document.querySelectorAll('[data-scenario]').forEach(b => {
        b.classList.toggle('active', b.dataset.scenario === scenario);
      });
      // If we're on the Choose Treatment screen, re-render. Otherwise also
      // jump there so the designer can see the new variant immediately.
      if (currentStep() === 'product') render();
      else jumpToScreen('product');
    });
  });
}

  if (overlay.classList.contains('open')) {
    closeOverlay();
    return;

  goBack();

}

document.getElementById('btn-exit').addEventListener('click', () => {
  // Steps that come after create-account - user already has an account so
  // we show "return anytime" instead of asking them to save progress.
  const step = currentStep();
  // The account is created at the account-processing step (sets accountCreated).
  // Once true, progress is saved -> "return anytime". Up to and including
  // account creation, prompt the user to save their progress.
  const hasStartedJourney = getHeightCm() > 0 || !!state.product || history.length > 1;

  if (state.accountCreated) {
    openOverlay('exit-save', 'return-anytime');
  } else if (hasStartedJourney && step !== 'landing') {
    openOverlay('exit-save');
  } else {
    history = ['landing'];
    lastDirection = 'back';
    render();
  }
});
