<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#05054b" />
<title>Boots Online Doctor - Weight Loss Treatment</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Cormorant+Garamond:ital,wght@1,600;1,700&display=swap" rel="stylesheet">
<style>
  /* Boots Sharp — brand typeface used across all prototype text. */
  @font-face {
    font-family: 'Boots Sharp';
    src: url('assets/fonts/BootsSharp-Light.otf') format('opentype');
    font-weight: 300;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'Boots Sharp';
    src: url('assets/fonts/BootsSharp-Regular.otf') format('opentype');
    font-weight: 400 500;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'Boots Sharp';
    src: url('assets/fonts/BootsSharp-Bold.otf') format('opentype');
    font-weight: 600 800;
    font-style: normal;
    font-display: swap;
  }

  :root {
    /* Legacy palette now mapped onto the BOD navy-blue tokens so all older
       components render in brand blue instead of near-black. */
    --navy:        #05054b;  /* was #111 — BOD action/default/100 */
    --navy-700:    #0a3a81;  /* was #000 — BOD action/default/80 (hover) */
    --navy-50:     #e5f4ff;  /* was #f5f5f5 — BOD pale blue tint */
    --teal:        #05054b;
    --teal-50:     #f5f5f5;
    --ink:         #111;
    --ink-2:       #3d3d3d;
    --muted:       #757575;
    --muted-2:     #aaa;
    --line:        #e5e5e5;
    --line-2:      #cacaca;
    --bg:          #ffffff;
    --surface:     #ffffff;
    --surface-2:   #fafafa;
    --success:     #00875a;
    --success-50:  #e3f5ec;
    --error:       #c41e3a;
    --error-50:    #fdecef;
    --warn:        #c2772f;
    --warn-50:     #fdf2e6;
    --orange:      #111;       /* primary CTAs are black */
    --orange-dark: #000;
    --price-green: #111;
    --radius:      8px;
    --radius-lg:   12px;
    --radius-sm:   4px;
    --shadow-sm:   0 1px 2px rgba(0, 0, 0, .04);
    --shadow-md:   0 4px 14px rgba(0, 0, 0, .06);
    --shadow-lg:   0 24px 60px rgba(0, 0, 0, .12);
    --focus:       0 0 0 2px #111;

    /* === Figma BOD design tokens (header / footer / buttons / progress) === */
    --bod-navy:        #05054b;  /* action/default/100 — header bg, primary text */
    --bod-deep-blue:   #0a3a81;  /* action/default/80  — Continue, progress fill */
    --bod-mid-blue:    #c4ddf6;  /* action/default/40  — progress track */
    --bod-pale-blue:   #e5f4ff;  /* action/default/20  — heading band, selected card bg */
    --bod-line:        #e7e7e7;  /* neutral/20         — borders / dividers */
    --bod-success:     #00740b;  /* semantic/success   — selection check */
    /* Page header gradient — light-blue at top fading gently to pure white
       further down the page, so there's no visible seam between the header
       and the body (Figma nodes 32:659 / 32:660). Painted on the scroll body
       with a tall background-size; ends in #ffffff to blend into white. */
    --bod-header-gradient: linear-gradient(180deg, #d4ecff 0%, #e5f4ff 26%, #eef8ff 52%, #f8fcff 78%, #ffffff 100%);
  }

  /* GP screen - segmented tabs */
  .gp-tabs {
    display: flex;
    background: #f5f5f5;
    border-radius: 6px;
    padding: 4px;
    margin-bottom: 14px;
    gap: 4px;
  }
  .gp-tab {
    flex: 1;
    background: transparent;
    border: 0;
    padding: 9px 12px;
    border-radius: 4px;
    font-weight: 500;
    font-size: 13px;
    color: #757575;
    cursor: pointer;
    font-family: inherit;
    transition: background .15s ease, color .15s ease, box-shadow .15s ease;
  }
  .gp-tab:hover { color: #111; }
  .gp-tab.active {
    background: #fff;
    color: #111;
    box-shadow: 0 1px 3px rgba(0,0,0,.08);
  }
  .gp-list { display: flex; flex-direction: column; gap: 8px; }
  .gp-card { padding: 14px 16px !important; cursor: pointer; }

  /* Disclaimer screen */
  .disclaimer-warn {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 16px;
    background: var(--warn-50);
    border-radius: 8px;
    margin-bottom: 4px;
    color: var(--warn);
    line-height: 1.5;
    font-size: 13px;
  }
  .disclaimer-warn-icon {
    font-size: 18px;
    flex-shrink: 0;
    line-height: 1;
    padding-top: 2px;
  }
  .disclaimer-warn strong {
    display: block;
    font-weight: 700;
    margin-bottom: 4px;
    color: var(--warn);
    font-size: 14px;
  }
  /* === Figma node 1:1116 "Before we start" body ===
     Outer body: flex-col, gap 24px, items-start, px 24px.
     Container card (1:1117): border 1px #e7e7e7, rounded 8px, p 24px, gap 8px, flex-col.
     Consent selector (1:1123): pale-blue bg, 3px navy border, rounded 8px, p 16px,
       flex, gap 16px, items-start. */

  /* Body wrapper — matches node 1:1116 */
  .disclaimer-body {
    display: flex;
    flex-direction: column;
    gap: 24px;
    align-items: flex-start;
    padding: 0;
    width: 100%;
    box-sizing: border-box;
  }

  /* "Things you need to know" card (node 1:1117) */
  .disclaimer-card {
    background: #fff;
    border: 1px solid var(--bod-line);
    border-radius: 8px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: flex-start;
    width: 100%;
    box-sizing: border-box;
    color: var(--bod-navy);
  }
  .disclaimer-card-title {
    /* Boots Sharp Bold 16/24, letter-spacing 0.2px */
    font-weight: 700;
    font-size: 16px;
    line-height: 24px;
    letter-spacing: 0.2px;
    color: var(--bod-navy);
    margin: 0;
  }
  .disclaimer-list {
    /* Native <ul> disc list — ms (margin-start) 21px per Figma.
       gap: 8px matches the Figma container gap between each bullet item. */
    margin: 0;
    padding: 0 0 0 21px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    list-style: disc;
    width: 100%;
    box-sizing: border-box;
  }
  .disclaimer-list li {
    font-weight: 400;
    font-size: 14px;
    line-height: 20px;
    letter-spacing: 0.1px;
    color: var(--bod-navy);
  }

  /* Consent selector (node 1:1123)
     Unselected: 2px neutral border (matches other selector cards).
     Selected: pale-blue bg, 3px navy border — padding adjusted by 1px
     on each side to compensate for the extra border width. */
  .disclaimer-row {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    padding: 16px;
    border: 2px solid var(--bod-line);
    border-radius: 8px;
    cursor: pointer;
    background: #fff;
    width: 100%;
    box-sizing: border-box;
    transition: border-color .15s ease, background .15s ease;
  }
  .disclaimer-row:hover { background: var(--bod-pale-blue); }
  .disclaimer-row.checked {
    background: var(--bod-pale-blue);
    border: 3px solid var(--bod-navy);
    padding: 15px;  /* 16px − 1px to compensate 2px→3px border change */
  }
  /* Checkbox (node 1:1124) — 24×24, bg deep-blue when checked, rounded 4px */
  .disclaimer-check {
    width: 24px;
    height: 24px;
    border-radius: 4px;
    border: 1px solid var(--bod-line);
    background: #fff;
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: background .15s ease, border-color .15s ease;
    box-sizing: border-box;
  }
  .disclaimer-check img {
    width: 14px; height: 11px;
    display: none;
  }
  .disclaimer-row.checked .disclaimer-check {
    background: var(--bod-deep-blue);
    border-color: var(--bod-deep-blue);
  }
  .disclaimer-row.checked .disclaimer-check img { display: block; }
  .disclaimer-row-text {
    flex: 1 0 0;
    font-weight: 400;
    font-size: 14px;
    line-height: 20px;
    letter-spacing: 0.1px;
    color: var(--bod-navy);
    min-width: 0;
  }

  /* Real product photo (used on tile + PDP) */
  .pen-photo {
    display: block;
    width: 80%;
    height: auto;
    max-height: 80%;
    object-fit: contain;
  }
  /* PDP hero - cap height so square/tall source images render at the same
     visual scale as the wide Wegovy pen. All pens then sit centred in the
     hero at a consistent ~120px display height. */
  .pdp-hero .pen-photo {
    width: auto;
    height: auto;
    max-width: 92%;
    max-height: 130px;
    object-fit: contain;
    margin: 0 auto;
  }

  /* ========================================================================
     Nike-style overrides - minimal black/white aesthetic
     ======================================================================== */
  html, body {
    font-family: 'Boots Sharp', 'Helvetica Neue', 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  }
  /* Big, bold, sentence-case page headings */
  h2 {
    font-size: 30px !important;
    font-weight: 700 !important;
    color: #111 !important;
    letter-spacing: -0.01em !important;
    line-height: 1.15 !important;
  }
  /* App bar title - sentence case, mid-weight, not uppercase */
  .app-bar h1 {
    text-transform: none;
    letter-spacing: 0;
    font-size: 13px;
    font-weight: 500;
    color: #111;
  }
  /* Section headings */
  .section-h {
    font-size: 22px;
    font-weight: 700;
    color: #111;
    letter-spacing: -0.005em;
  }
  /* Eyebrow / small labels - sentence case, less prominent */
  .eyebrow {
    color: #757575;
    text-transform: none;
    letter-spacing: 0;
    font-weight: 600;
    font-size: 13px;
  }
  /* Inputs - Nike rounded grey-bordered look */
  .field input,
  .field select,
  .search-row input,
  .postcode-row .field input {
    border: 1px solid #cacaca !important;
    border-radius: 6px !important;
    padding: 16px !important;
    height: 56px !important;
    font-size: 16px !important;
    color: #111;
  }
  /* Restore left padding for inputs with a leading icon - the Nike
     override above flattens padding to 16px, hiding the gap the icon
     needs to sit in (so icon + placeholder stack on top of each other). */
  .field.has-icon input,
  .postcode-row .field.has-icon input { padding-left: 48px !important; }
  /* Vertically centre the icon inside the taller (56px) input. */
  .field.has-icon .field-icon { top: 42px; }
  .field input:focus,
  .field select:focus { border-color: #111 !important; box-shadow: none !important; }
  .field label {
    text-transform: none;
    letter-spacing: 0;
    font-weight: 500;
    color: #757575;
    font-size: 13px;
  }
  /* Buttons - pill shape, black/white minimal */
  .btn {
    border-radius: 999px;
    font-weight: 500;
    height: 56px;
    font-size: 16px;
  }
  .btn-primary { background: #111; color: #fff; }
  .btn-primary:hover { background: #000; }
  .btn-primary:disabled { background: #e5e5e5; color: #aaa; }
  .btn-secondary { background: #fff; color: #111; border: 1px solid #cacaca; }
  .btn-secondary:hover { background: #f5f5f5; }
  /* Footer continue button keeps the same pill style */
  .footer { border-top: 1px solid #e5e5e5; padding: 16px 24px 24px; }
  /* Cards - less rounded, thin borders, no shadow tint */
  .card {
    border-radius: 8px;
    border: 1px solid #e5e5e5;
    box-shadow: none;
  }
  .card.selected {
    border-color: #111;
    box-shadow: 0 0 0 1px #111;
  }
  /* Selectable cards (radios, fulfilment, payment methods) */
  /* === Figma node 1:1828 — Payment Set up stepper === */
  /* "You're almost there" checklist — Figma node 32:1533. Left rail of
     circles joined by a vertical line, bordered card to the right. */
  .pcs-steps { display: flex; flex-direction: column; width: 100%; }
  .pcs-row { display: flex; gap: 12px; width: 100%; align-items: stretch; }
  .pcs-rail {
    position: relative; width: 24px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .pcs-rail::before {
    content: ''; position: absolute; left: 50%; transform: translateX(-50%);
    width: 2px; top: 0; bottom: 0; background: var(--bod-line);
  }
  .pcs-row:first-child .pcs-rail::before { top: 50%; }
  .pcs-row:last-child .pcs-rail::before { bottom: 50%; }
  .pcs-circle {
    position: relative; z-index: 1;
    width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .pcs-circle.next { background: #fff; border: 2px solid var(--bod-line); }
  .pcs-circle.done { background: var(--bod-success); }
  .pcs-card {
    flex: 1 0 0; min-width: 0; display: flex; gap: 8px; align-items: flex-start;
    border: 2px solid var(--bod-line); border-radius: 8px; padding: 16px;
    box-sizing: border-box; margin: 8px 0;
  }
  .pcs-text { flex: 1 0 0; min-width: 0; display: flex; flex-direction: column; gap: 4px; }
  .pcs-title { font-size: 14px; font-weight: 700; line-height: 20px; letter-spacing: 0.1px; color: var(--bod-navy); }
  .pcs-sub { font-size: 14px; font-weight: 400; line-height: 20px; letter-spacing: 0.1px; color: var(--bod-navy); }
  .pcs-edit {
    flex-shrink: 0; background: none; border: 0; padding: 0; cursor: pointer;
    font: inherit; font-size: 14px; letter-spacing: 0.1px; color: var(--bod-navy);
    text-decoration: underline;
  }

  /* Live BMI readout under the Height/Weight inputs */
  .hw-bmi {
    font-size: 14px; line-height: 20px; letter-spacing: 0.1px;
    color: var(--bod-navy); margin: 0;
  }
  .hw-bmi strong { font-size: 18px; font-weight: 700; }

  /* === q-name clinician intro (value exchange) === */
  .qname-clinician {
    background: linear-gradient(90deg,rgba(255,255,255,.5),rgba(255,255,255,.5)),
                linear-gradient(90deg,#dff1eb,#dff1eb);
    border-radius: 8px; padding: 16px; width: 100%; box-sizing: border-box;
    display: flex; flex-direction: column; gap: 12px;
  }
  .qname-clinician-head { display: flex; gap: 8px; align-items: center; }
  .qname-clinician-avatar {
    width: 48px; height: 48px; border-radius: 50%; overflow: hidden; flex-shrink: 0;
    background: var(--bod-deep-blue);
  }
  .qname-clinician-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .qname-clinician-meta { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .qname-clinician-role {
    font-size: 12px; line-height: 20px; letter-spacing: 0.1px;
    text-transform: uppercase; color: var(--bod-navy);
  }
  .qname-clinician-name {
    font-size: 12px; line-height: 20px; letter-spacing: 0.1px;
    font-weight: 700; color: var(--bod-navy);
  }
  .qname-clinician-quote { display: flex; gap: 8px; align-items: flex-start; }
  .qname-clinician-bar { width: 3px; border-radius: 88px; background: #61bb99; align-self: stretch; flex-shrink: 0; }
  .qname-clinician-text {
    flex: 1 0 0; min-width: 0; margin: 0;
    font-size: 18px; line-height: 26px; letter-spacing: 0.2px; color: var(--bod-navy);
  }
  .qname-clinician-body {
    margin: 0; font-size: 12px; line-height: 18px; letter-spacing: 0.1px; color: var(--bod-navy);
  }

  /* === Figma BOD selector cards (Fulfilment, delivery options, etc.) === */
  .ful-card {
    position: relative;
    display: flex; flex-direction: column; gap: 8px;
    border: 2px solid var(--bod-line); border-radius: 8px;
    padding: 24px 16px; width: 100%; box-sizing: border-box;
    cursor: pointer; background: #fff;
    transition: background .12s, border-color .12s;
  }
  .ful-card:hover { border-color: var(--bod-navy); }
  .ful-card.selected {
    background: var(--bod-pale-blue); border: 3px solid var(--bod-navy);
    padding: 23px 15px;
  }
  .ful-card-row { display: flex; gap: 8px; align-items: center; width: 100%; }
  /* Green filled tick shown bottom-right of a selected card — the app-wide
     "selected" affordance (Figma node 32:1336). */
  .ful-card-check {
    position: absolute; right: 16px; bottom: 16px;
    width: 24px; height: 24px; border-radius: 50%;
    background: var(--bod-success); flex-shrink: 0;
    display: none; align-items: center; justify-content: center;
  }
  .ful-card.selected .ful-card-check { display: flex; }
  .ful-card-title {
    flex: 1 0 0; min-width: 0;
    font-size: 18px; line-height: 27px; letter-spacing: 0.2px;
    font-weight: 400; color: var(--bod-navy);
  }
  .ful-card-price {
    font-size: 14px; line-height: 20px; letter-spacing: 0.1px;
    color: var(--bod-navy); white-space: nowrap; text-align: right;
  }
  .ful-card-sub {
    font-size: 14px; line-height: 20px; letter-spacing: 0.1px;
    color: var(--bod-navy); margin: 0;
  }
  .ful-card-usps { display: flex; flex-direction: column; gap: 4px; margin: 0; padding: 0; list-style: none; }
  .ful-card-usps li {
    display: flex; gap: 4px; align-items: flex-start;
    font-size: 14px; line-height: 20px; letter-spacing: 0.1px; color: var(--bod-navy);
  }
  .ful-card-usps .ful-tick {
    width: 16px; height: 16px; border-radius: 50%;
    border: 1.5px solid var(--bod-success); flex-shrink: 0; margin-top: 2px;
    display: flex; align-items: center; justify-content: center; box-sizing: border-box;
  }
  /* Inline edit/summary chip under a selected fulfilment card */
  .ful-card-detail {
    margin-top: 4px; background: #fff; border-radius: 8px; padding: 12px;
    display: flex; gap: 8px; align-items: flex-start;
    font-size: 14px; line-height: 20px; color: var(--bod-navy);
  }
  .ful-card-detail-edit {
    margin-left: auto; background: none; border: 0; cursor: pointer;
    color: var(--bod-navy); text-decoration: underline; font: inherit; font-size: 14px;
    flex-shrink: 0;
  }

  .pm, .store-card, .delivery-option, .fulfilment {
    border-radius: 8px;
    border: 1px solid #cacaca;
  }
  .pm.selected, .store-card.selected, .delivery-option.selected, .fulfilment.selected {
    border-color: #111;
    border-width: 1.5px;
  }
  /* Radio dot - use solid black */
  .radio { border-color: #cacaca; }
  .selected .radio,
  .card.selected .radio,
  .pm.selected .radio,
  .store.selected .radio { border-color: #111; }
  .selected .radio::after,
  .card.selected .radio::after,
  .pm.selected .radio::after,
  .store.selected .radio::after { background: #111; }
  /* Progress bar - thin, black on light grey */
  .progress-bar { background: #e5e5e5; height: 4px; }
  .progress-bar-fill { background: #111; }
  .progress { border-bottom: 1px solid #e5e5e5; }
  /* CTA button on PDP (was orange) - now solid black */
  .btn-continue-product {
    background: #111 !important;
    color: #fff !important;
    border-radius: 999px !important;
    height: 56px !important;
    font-weight: 500 !important;
  }
  .btn-continue-product:hover { background: #000 !important; }
  /* View details button on tile - black */
  .btn-view-details {
    background: #111;
    color: #fff;
    border-radius: 999px;
    height: 56px;
    font-weight: 500;
    font-size: 15px;
  }
  .btn-view-details:hover { background: #000; }
  /* Select buttons inside cards */
  .btn-select {
    background: #fff;
    border: 1px solid #cacaca;
    color: #111;
    border-radius: 999px;
    height: 48px;
    font-weight: 500;
  }
  .fulfilment.selected .btn-select { background: #111; color: #fff; border-color: #111; }
  /* Tag chips */
  .product-chip {
    background: #f5f5f5;
    color: #111;
    border-radius: 4px;
    font-weight: 400;
  }
  /* USP filled circle check on product tile */
  .product-usps li .check-circle { background: #111; }
  /* Prices - use black instead of green */
  .product-price-current,
  .pdp-price-current { color: #111; }
  /* Promo / banners - keep green for promo */
  /* Trust banner - minimal */
  .trust { background: #f5f5f5; color: #3d3d3d; border-radius: 8px; }
  /* "What's next" callout */
  .whats-next { background: #f5f5f5; color: #111; border-radius: 8px; }
  .whats-next strong { color: #111; }
  /* Confirm tick on payment-set-up */
  .confirm-tick { background: #111; color: #fff; }
  /* Order summary */
  .order-summary { border-radius: 8px; }
  /* Pen image hero - neutral grey background */
  .product-hero { background: #fafafa !important; }
  .product-hero.mounjaro { background: #fafafa !important; }
  .product-hero.wegovy   { background: #fafafa !important; }
  .product-hero.nevolat  { background: #fafafa !important; }
  .product-hero.xenical  { background: #fafafa !important; }
  .pdp-hero { background: #fafafa !important; }
  .pdp-hero.mounjaro { background: #fafafa !important; }
  /* Price toggle in app bar - minimal */
  .price-toggle.on { background: #111; color: #fff; border-color: #111; }
  /* Picker (dev tool) - keep navy for distinction from product UI */
  .picker-btn.active { background: #111; color: #fff; }
  .picker-label::before { background: #111; }
  /* Saved address chip + summary block - neutral */
  .saved-address { background: #f5f5f5; }
  .summary-block { border-color: #e5e5e5; }
  .fulfilment-summary { background: #f5f5f5; color: #3d3d3d; }
  .fulfilment-summary strong { color: #111; }
  /* Overlay address summary */
  .overlay-address-summary { background: #f5f5f5; }
  .overlay-address-summary strong { color: #111; }
  /* PDP currently-selected banner */
  .pdp-currently-selected { background: #f5f5f5; color: #111; }
  /* Tabs in overlay - Nike segmented look */
  .fulfilment-tabs { background: #f5f5f5; border-radius: 6px; }
  .fulfilment-tab.active { background: #fff; color: #111; }
  /* Price stat cards on PDP */
  .pdp-stat { background: #fafafa; border: 1px solid #e5e5e5; border-radius: 8px; }
  .pdp-stat-num { color: #111; }
  /* Card brand row dim */
  .card-brand-row .brand.active { border-color: #111; }
  /* Confirmation timeline dots */
  .timeline-dot { background: #f5f5f5; color: #111; }
  .timeline-dot.done { background: #111; color: #fff; }
  /* Switch link button - Nike outlined */
  .fulfilment-switch-btn {
    background: #fff;
    border: 1px solid #cacaca;
    border-radius: 999px;
    color: #111;
    font-weight: 500;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Boots Sharp', 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.45;
  }
  button { font-family: inherit; }
  a { color: var(--navy); }

  /* App stage */
  .stage {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }

  /* Screen picker (prototype navigator) */
  .picker {
    position: fixed;
    top: 24px;
    left: 24px;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 6px 24px rgba(15, 15, 50, .1);
    padding: 14px;
    width: 230px;
    z-index: 50;
    max-height: calc(100vh - 48px);
    overflow-y: auto;
  }
  .picker-label {
    font-size: 10px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .08em;
    padding: 4px 8px 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .picker-label::before {
    content: "";
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--orange);
  }
  .picker-btn {
    width: 100%;
    padding: 8px 10px;
    background: transparent;
    border: 0;
    border-radius: 8px;
    cursor: pointer;
    margin-bottom: 2px;
    font-size: 13px;
    text-align: left;
    color: var(--ink);
    font-family: inherit;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: background .12s ease;
  }
  .picker-btn:hover { background: var(--bg); }
  .picker-btn.active {
    background: var(--navy);
    color: #fff;
  }
  .picker-btn .num {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--bg);
    color: var(--muted);
    font-size: 10px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .picker-btn.active .num { background: rgba(255,255,255,.2); color: #fff; }
  .picker-divider {
    border: 0;
    border-top: 1px solid var(--line);
    margin: 8px 0;
  }
  .picker-section-title {
    font-size: 9px;
    font-weight: 800;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .12em;
    padding: 12px 10px 4px;
  }
  .picker-section-title:first-child { padding-top: 4px; }
  /* Medical questions group / dropdown in the navigator */
  .picker-group-children {
    display: none;
    padding: 2px 0 4px 8px;
    border-left: 2px solid var(--line);
    margin: 0 0 2px 12px;
  }
  .picker-group.open > .picker-group-children { display: block; }
  .picker-group-chevron {
    margin-left: auto;
    flex-shrink: 0;
    opacity: 0.4;
    transition: transform 0.18s ease, opacity 0.12s ease;
  }
  .picker-group-toggle:hover .picker-group-chevron { opacity: 0.7; }
  .picker-group.open .picker-group-chevron { transform: rotate(180deg); opacity: 0.6; }
  .picker-child {
    font-size: 12px;
    padding: 5px 8px;
    margin-bottom: 1px;
  }
  .picker-child .num {
    font-size: 9px;
    min-width: 26px;
    height: 18px;
  }
  .picker-reset {
    width: 100%;
    margin-top: 8px;
    padding: 8px 10px;
    background: transparent;
    border: 1px solid var(--line-2);
    border-radius: 8px;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    font-family: inherit;
  }
  .picker-reset:hover { background: var(--bg); color: var(--ink); }
  .picker-frame-toggle {
    width: 100%;
    margin-top: 6px;
    padding: 8px 10px;
    background: transparent;
    border: 1px solid var(--line-2);
    border-radius: 8px;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    font-family: inherit;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: background .12s ease, color .12s ease, border-color .12s ease;
  }
  .picker-frame-toggle:hover { background: var(--bg); color: var(--ink); }
  .picker-frame-toggle.active {
    background: #111;
    color: #fff;
    border-color: #111;
  }
  /* Segmented mini-toggle in the picker (e.g. Treatment view: Stacked / Carousel) */
  .picker-segment {
    width: 100%;
    margin-top: 8px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .picker-segment-label {
    font-size: 11px;
    color: var(--muted);
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding: 0 2px;
  }
  .picker-segment-btns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px;
    background: var(--bg);
    border-radius: 8px;
    padding: 3px;
  }
  .picker-segment-btns button {
    background: transparent;
    border: 0;
    padding: 6px 8px;
    font: inherit;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    border-radius: 6px;
    transition: background .12s ease, color .12s ease;
  }
  .picker-segment-btns button:hover { color: var(--ink); }
  .picker-segment-btns button.active {
    background: #fff;
    color: var(--ink);
    box-shadow: 0 1px 2px rgba(0,0,0,0.08);
  }
  .picker-export {
    width: 100%;
    margin-top: 6px;
    padding: 9px 10px;
    background: #111;
    color: #fff;
    border: 0;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    text-align: center;
  }
  .picker-export:hover { background: #000; }
  .picker-export:disabled { opacity: 0.6; cursor: wait; }

  /* Per-screen download icon inside each picker-btn.
     Uses position:absolute so it overlays on hover without
     consuming any space — labels stay full-width at all times. */
  .picker-btn {
    position: relative; /* anchor for absolute dl icon */
  }
  /* display:contents makes the wrapper invisible to layout —
     its children (.num + text) behave as direct flex children
     of .picker-btn, exactly as before. */
  .picker-btn-left {
    display: contents;
  }
  .picker-btn-dl {
    position: absolute;
    right: 6px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    align-items: center;
    justify-content: center;
    width: 22px;
    height: 22px;
    border-radius: 5px;
    background: none;
    color: var(--muted);
    opacity: 0;
    transition: opacity 0.12s ease, background 0.12s ease, color 0.12s ease;
    cursor: pointer;
  }
  .picker-btn:hover .picker-btn-dl { opacity: 1; }
  .picker-btn:hover { padding-right: 30px; } /* nudge text left only on hover */
  .picker-btn-dl:hover { background: rgba(0,0,0,0.07); color: var(--navy); }
  .picker-btn.active .picker-btn-dl { opacity: 1; color: rgba(255,255,255,0.7); }
  .picker-btn.active { padding-right: 30px; }
  .picker-btn.active .picker-btn-dl:hover { background: rgba(255,255,255,0.15); color: #fff; }
  .picker-btn-dl.busy { opacity: 1 !important; animation: picker-dl-spin 0.8s linear infinite; }
  @keyframes picker-dl-spin {
    to { transform: rotate(360deg); }
  }

  /* Picker link to the responsive view (opens new tab without phone + nav) */
  .picker-responsive-link {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    width: 100%;
    margin-top: 6px;
    padding: 9px 10px;
    background: #fff;
    color: var(--ink);
    border: 1px solid var(--line-2);
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    text-decoration: none;
    font-family: inherit;
    transition: background .12s ease, border-color .12s ease;
  }
  .picker-responsive-link:hover { background: var(--bg); border-color: var(--navy); }
  .picker-responsive-link svg { flex-shrink: 0; }

  /* Legacy toggle elements removed from markup - keep CSS hidden in case
     anything still references them. */
  .view-toggle-fab,
  .picker-view-toggle { display: none !important; }

  /* View toggle inside picker - Phone vs Web */
  .picker-view-toggle {
    display: flex;
    background: var(--bg);
    border-radius: 8px;
    padding: 3px;
    margin: 0 0 10px;
    gap: 2px;
  }
  .picker-view-btn {
    flex: 1;
    padding: 7px 8px;
    border: 0;
    background: transparent;
    border-radius: 6px;
    font: inherit;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: background .12s ease, color .12s ease;
  }
  .picker-view-btn svg { flex-shrink: 0; }
  .picker-view-btn:hover { color: var(--ink); }
  .picker-view-btn.active {
    background: #fff;
    color: var(--ink);
    box-shadow: 0 1px 2px rgba(0, 0, 0, .08);
  }

  /* "Hide phone frame" — strips visual chrome but keeps 375×844 dimensions
     so the content still fills the same fixed canvas as prototype mode. */
  body.no-phone-frame .device {
    border-radius: 0 !important;
    box-shadow: 0 0 0 1px var(--line) !important;
    /* Preserve the 375×844 prototype dimensions */
    width: 375px !important;
    height: 844px !important;
  }
  body.no-phone-frame .device::before { display: none !important; }
  body.no-phone-frame .status-bar { display: none !important; }
  body.no-phone-frame .floating-back { display: none !important; }

  /* Responsive / web view — fully fluid, no size constraints.
     Picker is hidden so the layout reads as a real product page. */
  body.web-view .stage { padding: 0; min-height: auto; align-items: stretch; display: block; }
  body.web-view .picker { display: none !important; }
  body.web-view .device {
    width: 100% !important;
    max-width: 100% !important;
    height: auto !important;
    min-height: 100vh;
    border-radius: 0 !important;
    box-shadow: none !important;
    overflow: visible;
  }
  body.web-view .device::before { display: none !important; }
  body.web-view .status-bar { display: none; }
  /* Keep the app header pinned to the top while the page scrolls. */
  body.web-view .app-bar {
    position: sticky;
    top: 0;
    z-index: 20;
    background: var(--bod-navy);
  }
  body.web-view .floating-back { display: none !important; }
  body.web-view .body { padding: 0 24px 24px; }
  body.web-view .footer {
    position: sticky;
    bottom: 0;
    background: var(--surface);
    z-index: 5;
  }
  /* Anchor overlay to the viewport in web view so the bottom sheet slides
     up from the screen edge regardless of how far the user has scrolled. */
  body.web-view .overlay { position: fixed; inset: 0; }

  /* Floating view toggle - always-visible pill in the top-right so the
     user can flip between Phone and Web from either mode. */
  .view-toggle-fab {
    position: fixed;
    top: 16px;
    right: 16px;
    z-index: 90;
    display: flex;
    background: rgba(255, 255, 255, 0.96);
    backdrop-filter: saturate(180%) blur(10px);
    -webkit-backdrop-filter: saturate(180%) blur(10px);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 4px;
    gap: 2px;
    box-shadow: 0 4px 16px rgba(15, 15, 50, 0.08);
  }
  .view-toggle-fab button {
    background: transparent;
    border: 0;
    border-radius: 999px;
    padding: 7px 14px;
    font: inherit;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: background .12s ease, color .12s ease;
  }
  .view-toggle-fab button:hover { color: var(--ink); }
  .view-toggle-fab button.active {
    background: #111;
    color: #fff;
    box-shadow: 0 1px 2px rgba(0, 0, 0, .15);
  }
  body.embed-mode .view-toggle-fab { display: none !important; }
  @media (max-width: 960px) {
    .picker {
      position: static;
      width: 100%;
      max-width: 430px;
      margin: 0 auto 20px;
    }
    .stage {
      flex-direction: column;
      padding: 16px;
      align-items: center;
    }
  }
  @media (max-width: 480px) {
    .picker { display: none; }
  }

  /* Journey export embed mode: hide picker, keep phone frame at any viewport */
  body.embed-mode .picker { display: none !important; }
  body.embed-mode .stage {
    padding: 24px;
    flex-direction: row;
    align-items: center;
    min-height: 100vh;
  }
  body.embed-mode .device {
    max-width: 375px;
    height: 844px;
    border-radius: 44px;
    box-shadow:
      0 0 0 1px #d6d6d6,
      0 0 0 10px #0f0f10,
      0 0 0 11px #2a2a2c,
      var(--shadow-lg);
  }
  body.embed-mode .device::before { display: block; }
  .device {
    width: 375px;
    max-width: 375px;
    height: 844px;
    background: var(--surface);
    border-radius: 44px;
    box-shadow:
      0 0 0 1px #d6d6d6,
      0 0 0 10px #0f0f10,
      0 0 0 11px #2a2a2c,
      var(--shadow-lg);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
  }
  /* Notch + status bar */
  .status-bar {
    height: 44px;
    padding: 16px 24px 4px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
    flex-shrink: 0;
    position: relative;
    z-index: 2;
  }
  .status-bar::after {
    content: "";
    position: absolute;
    top: 6px;
    left: 50%;
    transform: translateX(-50%);
    width: 110px;
    height: 28px;
    background: #0f0f10;
    border-radius: 0 0 18px 18px;
  }
  .status-icons { display: flex; gap: 6px; align-items: center; }
  .status-icons svg { width: 14px; height: 14px; }

  /* Top app bar */
  /* Figma BOD masthead — node 1:1089
     display: flex; flex-direction: column; align-items: flex-start;
     width: 375px; border-radius: 0 0 8px 8px. Inner top-header bar is
     64px tall with 4px/20px padding and items-center / justify-between. */
  .app-bar {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    padding: 0;
    background: transparent;
    flex-shrink: 0;
    position: relative;
    z-index: 1;
    border-radius: 0;
    overflow: visible;
  }
  .app-bar-row {
    /* Inner "Top Header" — node 0:313 */
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    width: 100%;
    height: 64px;
    padding: 4px 20px;
    background: var(--bod-navy);
    box-sizing: border-box;
  }
  .icon-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 0;
    background: transparent;
    color: var(--ink);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: background .15s ease;
  }
  .icon-btn:hover { background: var(--bg); }
  .icon-btn:disabled { opacity: 0; pointer-events: none; }
  .icon-btn:focus-visible { outline: none; box-shadow: var(--focus); }
  .app-bar h1 {
    font-size: 14px;
    font-weight: 600;
    color: var(--muted);
    margin: 0;
    letter-spacing: .02em;
    text-transform: uppercase;
    flex: 1;
    text-align: center;
  }
  .help-link {
    font-size: 13px;
    color: var(--navy);
    font-weight: 600;
    text-decoration: none;
    padding: 6px 8px;
    border-radius: 8px;
  }
  .help-link:hover { background: var(--bg); }
  .app-bar-spacer {
    width: 36px;
    height: 36px;
    flex-shrink: 0;
  }

  /* === Figma node 0:312 "Masthead" inner elements === */

  /* Back chevron — hidden by default; shown on PDP via pdp-mode rule */
  .app-bar-back {
    display: none;
    width: 40px; height: 40px;
    background: none; border: 0; padding: 0; cursor: pointer;
    color: #fff;
    align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .device.pdp-mode .app-bar-back { display: none !important; }

  /* H1 title — hidden, nav uses the logo instead */
  .app-bar h1#app-title { display: none !important; }

  /* Figma node 0:314 — logo container: 170×34px, relative, clips the image */
  .bod-logo {
    flex-shrink: 0;
    margin-right: auto;
  }
  .bod-logo-inner {
    position: relative;
    width: 170px;
    height: 34px;
    overflow: hidden;
  }
  .bod-logo-inner img {
    /* Figma: h 85.29%, left -0.56%, top 8.82%, w 99.35% — absolute inside container */
    position: absolute;
    width: 99.35%;
    height: 85.29%;
    left: -0.56%;
    top: 8.82%;
    object-fit: contain;
    object-position: left center;
    display: block;
    max-width: none;
  }

  /* Figma node 0:315 — X button: 40×40px flex, items-center, justify-center */
  .app-bar-exit {
    width: 40px; height: 40px;
    background: none; border: 0; padding: 0; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    border-radius: 4px;
    transition: background .15s ease;
  }
  .app-bar-exit:hover { background: rgba(255,255,255,0.15); }
  .app-bar-exit:disabled { opacity: 0; pointer-events: none; }
  /* Figma node I0:316;28:6793;46:6981 — X icon: 24×24 wrapper, inset 21.88% */
  .app-bar-x-wrap {
    position: relative;
    width: 24px; height: 24px;
    overflow: clip;
  }
  .app-bar-x-wrap img {
    position: absolute;
    inset: 21.88%;
    width: calc(100% - 2 * 21.88%);
    height: calc(100% - 2 * 21.88%);
    display: block;
  }

  /* ===== Question screens — pale blue hero + card options =====
     (The navy masthead is now global — see `.app-bar` rules above — so the
     header no longer needs question-mode overrides.) */

  /* White back row beneath the navy header */
  /* The white back-row strip that used to sit above the heading band is
     retired — back is now handled by the sticky footer Back button. */
  .q-backrow { display: none !important; }
  .q-backrow-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: transparent;
    border: 0;
    font: inherit;
    font-size: 16px;
    font-weight: 600;
    color: #182671;
    cursor: pointer;
    padding: 0;
  }
  .q-backrow-btn:disabled { opacity: 0.35; cursor: default; }
  .q-backrow-btn svg { flex-shrink: 0; }

  /* Progress now lives in the sticky footer (Figma 4-pill tracker), so the
     top progress bar is hidden everywhere. */
  .progress { display: none !important; }

  .device.question-mode .body {
    padding-top: 0;
  }
  /* Header gradient painted on the scroll body so the blue flows behind the
     header AND the start of the page content, fading to white with no seam.
     Anchored to the top of the body box (default background-attachment) so it
     stays put while content scrolls. */
  .device.question-mode .body,
  .device.has-header .body {
    background-color: #fff;
    background-image: var(--bod-header-gradient);
    background-repeat: no-repeat;
    background-position: top center;
    background-size: 100% 320px;
  }
  /* Figma outer layout spec:
     display:flex; flex-direction:column; align-items:flex-start; gap:24px
     Applied to the .screen wrapper so all sections (heading band, content,
     and the gap before the sticky footer) are laid out with a consistent
     24px gap. This replaces the old margin-top hack. */
  .device.question-mode .body > .screen {
    display: flex;
    flex-direction: column;
    align-items: stretch;   /* children fill full content width (327px) */
    gap: 24px;
    width: 100%;
  }
  /* Heading band — pale blue strip behind the H2 + lede.
     The render function wraps content in a `.screen` div inside `.body`,
     so the heading wrapper is `.body > .screen > div:first-child`.
     Medical questions put a `.medical-progress` bar first, so the heading
     wrapper there sits at `.body > .screen > .medical-progress + div`. */
  /* Question heading band — Figma node 1:1090 "Title"
     display: flex; min-height: 164px; padding: 24px; flex-direction: column;
     justify-content: flex-end; align-items: center; align-self: stretch;
     background: #E5F4FF. */
  /* All question screens: heading band is always div:first-child (no
     more .medical-progress prefix — that element has been removed). */
  .device.question-mode .body > .screen > div:first-child {
    background: transparent;
    margin: 0 -24px;
    padding: 24px !important;
    min-height: 164px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    align-items: center;
    align-self: stretch;
  }
  .device.question-mode .body > .screen > div:first-child h2 {
    color: var(--bod-navy) !important;
    font-size: 24px !important;
    line-height: 32px !important;
    letter-spacing: 0.2px !important;
    font-weight: 400 !important;
    margin: 0 !important;
    width: 100%;       /* span the band so heading + lede share the same left edge */
    text-align: left;
  }
  .device.question-mode .body > .screen > div:first-child .lede {
    color: var(--bod-navy) !important;
    font-size: 14px !important;
    line-height: 20px !important;
    letter-spacing: 0.1px !important;
    margin: 8px 0 0;
    width: 100%;       /* match the heading's left edge */
    text-align: left;
  }
  /* gap:24px on .screen (added above) now handles all section spacing —
     no per-element margin-top override needed. */

  /* === Figma node 1:1167 — Selector cards (ethnicity, gender, reasons, etc.)
     Outer wrap: flex-col, gap 12px (already set in .q-options).
     Each card: flex row, align-items center, gap 16px, p 16px, 2px #e7e7e7 border, 8px radius.
     Selected: pale-blue bg, 3px navy border, padding compensated for thicker border.
     Check circle (node 1:1171): 24px, round, opacity 0 when unselected, green #00740b when selected. */
  .device.question-mode .q-option {
    display: flex;
    align-items: center;
    gap: 16px;
    background: #fff;
    border-radius: 8px;
    border: 2px solid var(--bod-line);
    padding: 16px;
    min-height: 72px;
    width: 100%;
    box-sizing: border-box;
    color: var(--bod-navy);
    font-weight: 400;
    font-size: 14px;
    line-height: 20px;
    letter-spacing: 0.1px;
    text-align: left;
    cursor: pointer;
    transition: background .12s ease, border-color .12s ease;
  }
  .device.question-mode .q-option:hover {
    border-color: var(--bod-navy);
  }
  .device.question-mode .q-option.selected {
    background: var(--bod-pale-blue);
    border: 3px solid var(--bod-navy);
    padding: 15px;  /* compensate 1px extra border each side */
  }
  /* Label — flex:1 so text fills available width */
  .device.question-mode .q-option-label {
    flex: 1 0 0;
    min-width: 0;
  }
  /* Check circle — filled green when selected, hidden when unselected */
  .device.question-mode .q-option-check {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: transparent;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity .12s ease, background .12s ease;
  }
  .device.question-mode .q-option.selected .q-option-check {
    background: var(--bod-success);
    opacity: 1;
  }

  /* Price toggle in app bar (only shown on Product step) */
  .price-toggle {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: transparent;
    border: 1.5px solid var(--line-2);
    border-radius: 999px;
    padding: 4px 12px 4px 5px;
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    cursor: pointer;
    transition: background .15s ease, color .15s ease, border-color .15s ease, opacity .15s ease;
    font-family: inherit;
    height: 32px;
    flex-shrink: 0;
    visibility: hidden;
  }
  .app-bar.show-toggle .price-toggle { visibility: visible; }
  .price-toggle:hover { background: var(--bg); }
  .price-toggle.on {
    background: var(--navy);
    color: #fff;
    border-color: var(--navy);
  }
  .price-toggle.on:hover { background: var(--navy-700); }
  .price-toggle .switch {
    width: 24px;
    height: 16px;
    background: #fff;
    border: 1px solid var(--line-2);
    border-radius: 99px;
    position: relative;
    flex-shrink: 0;
    transition: background .15s ease, border-color .15s ease;
  }
  .price-toggle.on .switch {
    background: rgba(255,255,255,.22);
    border-color: transparent;
  }
  .price-toggle .switch::after {
    content: "";
    position: absolute;
    top: 1px;
    left: 1px;
    width: 12px;
    height: 12px;
    background: var(--muted-2);
    border-radius: 50%;
    transition: left .2s ease, background .15s ease;
  }
  .price-toggle.on .switch::after {
    left: 10px;
    background: #fff;
  }

  /* Floating back button (used on PDP when chrome is hidden) */
  .floating-back {
    position: absolute;
    top: 54px;
    left: 14px;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.92);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 0;
    cursor: pointer;
    z-index: 5;
    box-shadow: 0 2px 10px rgba(15, 15, 50, .15);
    display: none;
    align-items: center;
    justify-content: center;
    color: var(--ink);
    transition: background .15s ease;
  }
  .floating-back:hover { background: #fff; }
  .floating-back:active { transform: scale(.95); }
  /* PDP keeps the sticky app-bar header for consistency with the rest of the
     journey. Unlike other commerce screens (which carry Back in the footer),
     the PDP footer is a single CTA, so the header's own Back chevron is shown
     here instead of the old floating back button. */
  /* PDP header has NO back chevron — navigation is via the footer Back button. */
  .device.pdp-mode .app-bar-back { display: none !important; }
  .device.pdp-mode .progress { display: none; }
  /* Landing page (marketing) is the public Boots Online Doctor product page
     — the prototype chrome (navy masthead with X close, sticky journey
     footer) is hidden here. The landing renders its own site-style header
     and footer inline. The journey chrome reappears as soon as the user
     taps any "Get started" CTA. */
  .device.landing-mode .app-bar { display: none !important; }
  .device.landing-mode .footer { display: none !important; }
  .device.landing-mode .body { padding: 0 !important; }
